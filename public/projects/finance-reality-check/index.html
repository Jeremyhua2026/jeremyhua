<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financial Reality Check</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Swiss Modernist — warm cream light base */
      --bg:           #F5F1EA;
      --bg-subtle:    #EDE9E1;
      --surface:      #FDFBF7;
      --surface-hover:#F0EDE6;
      --border:       #D8D2C6;
      --border-light: #C8C2B6;
      --text-primary: #111110;
      --text-secondary:#5A5650;
      --text-muted:   #8A8680;

      /* One accent: forest green */
      --accent:       #2A5E3A;
      --accent-light: #EBF3EE;
      --accent-glow:  rgba(42, 94, 58, 0.10);

      /* Semantic aliases (kept for compatibility) */
      --violet:       #2A5E3A;
      --violet-glow:  rgba(42, 94, 58, 0.10);
      --cyan:         #2A5E3A;
      --cyan-glow:    rgba(42, 94, 58, 0.08);
      --amber:        #8A6020;
      --amber-glow:   rgba(138, 96, 32, 0.10);
      --emerald:      #2A7848;
      --emerald-glow: rgba(42, 120, 72, 0.12);
      --rose:         #8A3030;
      --rose-glow:    rgba(138, 48, 48, 0.10);
      --blue:         #2A4A7A;
      --blue-glow:    rgba(42, 74, 122, 0.10);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── Background ── */
    .grid-bg { display: none; }

    /* ── Root decoration (organic branch, bottom-right) ── */
    .root-deco {
      position: fixed;
      bottom: -20px;
      right: -20px;
      width: 200px;
      height: 280px;
      pointer-events: none;
      z-index: 0;
      color: var(--accent);
      opacity: 0.07;
    }

    /* ── Scroll indicator ── */
    .scroll-indicator {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      animation: scroll-drift 2.6s ease-in-out infinite;
    }
    @keyframes scroll-drift {
      0%, 100% { opacity: 0.28; transform: translateX(-50%) translateY(0); }
      50%       { opacity: 0.6;  transform: translateX(-50%) translateY(6px); }
    }
    .scroll-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom,
        rgba(42, 94, 58, 0.12),
        rgba(42, 94, 58, 0.5)
      );
    }
    .scroll-chevron {
      stroke: var(--accent);
      stroke-width: 1.5px;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Landing needs relative for scroll indicator */
    .landing { position: relative; }

    .app-wrapper {
      position: relative;
      z-index: 1;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── Top Nav ── */
    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(245, 241, 234, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 15px;
      color: var(--text-primary);
      cursor: pointer;
      transition: opacity 0.2s;
      text-decoration: none;
    }

    .nav-brand:hover { opacity: 0.8; }

    .nav-brand .brand-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--violet);
      box-shadow: 0 0 8px var(--violet);
    }

    .nav-trust {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .nav-trust svg { width: 12px; height: 12px; }

    /* ── Landing Page ── */
    .landing {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 80px 24px 48px;
    }

    .landing-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--violet);
      background: var(--violet-glow);
      border: 1px solid rgba(42, 94, 58, 0.15);
      padding: 6px 16px;
      border-radius: 20px;
      margin-bottom: 32px;
    }

    .landing-badge .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--violet);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .landing h1 {
      font-size: clamp(32px, 6vw, 52px);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.04em;
      max-width: 600px;
      margin-bottom: 20px;
    }

    .landing h1 .gradient-text {
      color: var(--accent);
    }

    .landing .subtitle {
      font-size: 17px;
      color: var(--text-secondary);
      max-width: 460px;
      margin-bottom: 40px;
      line-height: 1.7;
    }

    .cta-btn {
      background: var(--violet);
      color: white;
      border: none;
      padding: 16px 40px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      box-shadow: 0 0 20px var(--violet-glow);
    }

    .cta-btn:hover {
      background: #1E4829;
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(42, 94, 58, 0.22);
    }

    .cta-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .cta-btn-secondary {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-primary);
      box-shadow: none;
    }

    .cta-btn-secondary:hover {
      background: var(--surface-hover);
      border-color: var(--border-light);
      box-shadow: none;
    }

    .landing-features {
      display: flex;
      gap: 32px;
      margin-top: 48px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .landing-feature {
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .landing-feature .feat-icon {
      width: 20px; height: 20px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
    }

    /* ── Upload Screen ── */
    .upload-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 24px 48px;
    }

    .upload-screen h2 {
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .upload-screen .step-subtitle {
      text-align: center;
      color: var(--text-secondary);
      margin-bottom: 40px;
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── Drop-all primary zone ── */
    .drop-all-zone {
      border: 1.5px dashed var(--border-light);
      border-radius: 16px;
      background: var(--surface);
      min-height: 200px;
      max-width: 620px;
      margin: 0 auto 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 28px;
      cursor: default;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      text-align: center;
      gap: 6px;
      width: 100%;
    }
    .drop-all-zone.dragging-over {
      border-color: var(--accent);
      background: var(--accent-light);
    }
    .drop-all-zone .drop-all-icon { font-size: 32px; margin-bottom: 4px; }
    .drop-all-zone .drop-all-label { font-size: 17px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.01em; }
    .drop-all-zone .drop-all-sub { font-size: 13px; color: var(--text-muted); }
    .drop-all-zone .drop-cue {
      display: block;
      margin-top: 8px;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }
    .drop-all-zone .pick-link {
      color: var(--accent);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .drop-all-zone .pick-link:hover { opacity: 0.75; }
    .drop-all-zone .file-list {
      width: 100%;
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    /* ── Add-more drop zone (persistent after files selected) ── */
    .drop-zone-add-more {
      margin-top: 14px;
      padding: 18px 16px;
      border: 2px dashed var(--border);
      border-radius: 10px;
      background: rgba(42, 94, 58, 0.04);
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .drop-zone-add-more:hover,
    .drop-all-zone.drag-over .drop-zone-add-more {
      border-color: var(--accent);
      background: rgba(42, 94, 58, 0.09);
    }
    .drop-zone-add-icon {
      font-size: 20px;
      margin-bottom: 4px;
      opacity: 0.6;
    }
    .drop-zone-add-label {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .drop-zone-add-label .pick-link {
      color: var(--accent);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .drop-zone-add-label .pick-link:hover { opacity: 0.75; }


    /* ── Money Personality ── */
    .personality-card {
      margin-top: 24px;
      padding: 20px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-align: center;
    }
    .personality-emoji { font-size: 32px; margin-bottom: 6px; }
    .personality-label {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .personality-desc {
      font-size: 13px;
      color: var(--text-muted);
      max-width: 340px;
      margin: 0 auto;
      line-height: 1.5;
    }

    /* ── 50/30/20 Budget Rule ── */
    .budget-rule-section { margin-top: 10px; }
    .budget-bars {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
    }
    .budget-bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .budget-bar-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      min-width: 62px;
      text-align: right;
    }
    .budget-bar-track {
      flex: 1;
      height: 28px;
      background: var(--bg);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }
    .budget-bar-fill {
      height: 100%;
      border-radius: 6px;
      display: flex;
      align-items: center;
      padding: 0 10px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      min-width: 36px;
      transition: width 0.6s ease;
    }
    .budget-bar-target {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--text);
      opacity: 0.35;
    }
    .budget-bar-target::after {
      content: attr(data-label);
      position: absolute;
      bottom: -16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .budget-bar-info {
      font-size: 12px;
      color: var(--text-muted);
      min-width: 80px;
    }

    /* ── Day of Week ── */
    .dow-grid {
      display: flex;
      gap: 6px;
      align-items: flex-end;
      height: 100px;
      margin-top: 12px;
    }
    .dow-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .dow-bar {
      width: 100%;
      max-width: 42px;
      border-radius: 4px 4px 0 0;
      transition: height 0.4s ease;
    }
    .dow-label { font-size: 11px; color: var(--text-muted); font-weight: 600; }
    .dow-amount { font-size: 10px; color: var(--text-muted); }

    /* ── Spending Heatmap ── */
    .heatmap-wrap { margin-top: 12px; }
    .heatmap-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
    }
    .heatmap-cell {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      position: relative;
    }
    .heatmap-cell:hover::after {
      content: attr(data-tip);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text);
      color: var(--bg);
      padding: 3px 7px;
      border-radius: 4px;
      font-size: 10px;
      white-space: nowrap;
      z-index: 10;
      pointer-events: none;
    }
    .heatmap-legend {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 8px;
      font-size: 10px;
      color: var(--text-muted);
    }
    .heatmap-legend-cell {
      width: 12px;
      height: 12px;
      border-radius: 2px;
    }

    .biggest-day-callout {
      margin-top: 12px;
      padding: 12px 16px;
      background: rgba(138, 48, 48, 0.06);
      border-left: 3px solid #8A3030;
      border-radius: 0 8px 8px 0;
      font-size: 13px;
      color: var(--text);
    }
    .biggest-day-callout strong { color: #8A3030; }

    /* ── Sort-by-type toggle row ── */
    .sort-toggle-row {
      max-width: 620px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
    }
    .sort-toggle-divider { flex: 1; height: 1px; background: var(--border); }
    .sort-toggle-btn {
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      background: none;
      border: none;
      padding: 2px 0;
      font-family: inherit;
      white-space: nowrap;
      transition: color 0.15s;
    }
    .sort-toggle-btn:hover { color: var(--accent); }

    .upload-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 620px;
      margin: 0 auto 32px;
    }

    @media (max-width: 560px) {
      .upload-cards { grid-template-columns: 1fr; }
    }

    .upload-card {
      border: 1px dashed var(--border-light);
      border-radius: 16px;
      padding: 32px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s;
      background: var(--surface);
      position: relative;
      overflow: hidden;
    }

    .upload-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.25s;
      border-radius: 16px;
    }

    .upload-card:hover {
      border-color: var(--text-muted);
      background: var(--surface-hover);
    }

    .upload-card.dragging-over {
      border-color: var(--cyan);
      border-style: solid;
      transform: scale(1.02);
      box-shadow: 0 0 30px var(--cyan-glow), inset 0 0 30px var(--cyan-glow);
    }

    .upload-card.dragging-over::before {
      opacity: 1;
      background: rgba(42, 94, 58, 0.04);
    }

    .upload-card.has-file {
      border-color: var(--accent);
      border-style: solid;
      background: rgba(42, 94, 58, 0.04);
    }

    .upload-card .card-icon {
      font-size: 32px;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .upload-card .card-label {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 4px;
      position: relative;
      z-index: 1;
    }

    .upload-card .card-sublabel {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }

    .upload-card .card-hint {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.4;
      position: relative;
      z-index: 1;
    }

    .upload-card .card-hint .drop-cue {
      display: block;
      margin-top: 6px;
      font-weight: 500;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }

    .upload-card .card-hint .pick-link {
      color: var(--accent);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .upload-card .card-hint .pick-link:hover {
      opacity: 0.75;
    }

    /* Multi-file list inside upload card */
    .upload-card .file-list {
      width: 100%;
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: relative;
      z-index: 1;
    }

    .upload-card .file-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-light);
      border: 1px solid rgba(42,94,58,0.2);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
    }

    .upload-card .file-pill-name {
      color: var(--emerald);
      font-weight: 600;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .upload-card .file-pill-meta {
      color: var(--text-muted);
      font-size: 11px;
      flex-shrink: 0;
    }

    .upload-card .file-pill-remove {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0 2px;
      font-family: inherit;
      flex-shrink: 0;
      transition: color 0.15s;
    }

    .upload-card .file-pill-remove:hover { color: var(--rose); }

    .upload-card .add-more {
      font-size: 12px;
      color: var(--cyan);
      cursor: pointer;
      text-align: center;
      padding: 4px;
      border-radius: 6px;
      transition: background 0.15s;
    }

    .upload-card .add-more:hover { background: var(--accent-light); }
    .upload-card .add-more span { cursor: pointer; text-decoration: underline; text-underline-offset: 2px; }

    .upload-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .sample-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .sample-btn:hover { color: var(--text-secondary); }

    .file-types-note {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .file-types-note span {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 500;
      margin: 0 2px;
    }

    /* Global drag overlay */
    .drag-overlay {
      position: fixed;
      inset: 0;
      background: rgba(42, 94, 58, 0.03);
      border: 2px dashed var(--accent);
      border-radius: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .drag-overlay-text {
      font-size: 18px;
      font-weight: 600;
      color: var(--cyan);
      background: var(--surface);
      padding: 16px 32px;
      border-radius: 12px;
      border: 1px solid rgba(42, 94, 58, 0.3);
      box-shadow: 0 4px 20px rgba(42,94,58,0.10);
    }

    /* ── Processing Screen ── */
    .processing-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 80px 24px 48px;
    }

    .processing-steps {
      display: flex;
      flex-direction: column;
      gap: 24px;
      align-items: flex-start;
    }

    .processing-step {
      font-size: 18px;
      color: var(--text-muted);
      transition: all 0.4s;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .processing-step.active {
      color: var(--text-primary);
      font-weight: 500;
    }

    .processing-step.done { color: var(--emerald); }

    .step-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border-light);
      flex-shrink: 0;
      transition: all 0.4s;
    }

    .processing-step.active .step-dot {
      background: var(--violet);
      box-shadow: 0 0 12px var(--violet-glow);
    }

    .processing-step.done .step-dot {
      background: var(--emerald);
      box-shadow: 0 0 8px var(--emerald-glow);
    }

    /* ── Results Screen ── */
    .results-screen { padding: 80px 24px 100px; }

    /* Summary card (shareable hero) */
    .summary-card {
      margin-bottom: 32px;
    }
    .summary-card-inner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 24px 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .summary-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .summary-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
    }
    .period-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-muted);
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 4px 12px;
      border-radius: 20px;
    }
    .period-badge .period-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--cyan);
    }
    .summary-hero {
      font-size: clamp(20px, 3.5vw, 30px);
      font-weight: 800;
      line-height: 1.25;
      letter-spacing: -0.025em;
      color: var(--text-primary);
      margin-bottom: 20px;
    }
    .summary-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 12px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .summary-stat { text-align: center; }
    .summary-stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 4px;
    }
    .summary-stat-value {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .section { margin-bottom: 48px; }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    /* Insight Cards */
    .insight-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .insight-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      font-size: 15px;
      line-height: 1.5;
      color: var(--text-primary);
      transition: border-color 0.2s;
    }

    .insight-card:hover { border-color: var(--border-light); }

    /* Focus Card */
    .focus-card {
      background: rgba(138, 96, 32, 0.05);
      border: 1px solid rgba(138, 96, 32, 0.18);
      border-radius: 16px;
      padding: 28px;
    }

    .focus-card .focus-icon { font-size: 24px; margin-bottom: 12px; }

    .focus-card .focus-text {
      font-size: 19px;
      font-weight: 600;
      line-height: 1.4;
      color: var(--amber);
    }

    /* Action Card */
    .action-card {
      background: var(--accent-light);
      border: 1px solid rgba(42, 94, 58, 0.18);
      border-radius: 16px;
      padding: 28px;
    }

    .action-card .action-icon { font-size: 24px; margin-bottom: 12px; }

    .action-card .action-text {
      font-size: 17px;
      font-weight: 500;
      line-height: 1.5;
      color: var(--text-primary);
    }

    /* Collapsible Details */
    .details-toggle {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 24px;
      width: 100%;
      text-align: left;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s;
    }

    .details-toggle:hover {
      background: var(--surface-hover);
      border-color: var(--border-light);
    }

    .details-content {
      margin-top: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      overflow-x: auto;
    }

    /* Pie chart */
    .pie-chart-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
      flex-wrap: wrap;
    }

    .pie-legend { display: flex; flex-direction: column; gap: 10px; }

    .pie-legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .pie-legend-dot {
      width: 10px; height: 10px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .pie-legend-amount { color: var(--text-primary); font-weight: 600; margin-left: auto; font-variant-numeric: tabular-nums; }
    .pie-legend-pct { color: var(--text-muted); font-size: 12px; min-width: 36px; text-align: right; }

    /* Bar chart */
    .bar-chart { display: flex; flex-direction: column; gap: 8px; }

    .bar-row { display: flex; align-items: center; gap: 12px; }

    .bar-label {
      font-size: 12px;
      color: var(--text-muted);
      width: 48px;
      text-align: right;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .bar-track {
      flex: 1; height: 32px;
      background: rgba(0,0,0,0.06);
      border-radius: 6px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 6px;
      transition: width 0.6s ease;
      display: flex;
      align-items: center;
      padding-left: 12px;
      font-size: 12px;
      font-weight: 600;
      color: white;
      min-width: fit-content;
      background: var(--accent);
    }

    /* Transaction table */
    .txn-table { width: 100%; border-collapse: collapse; font-size: 13px; }

    .txn-table th {
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }

    .txn-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
    }

    .txn-table tr:hover td { background: rgba(42,94,58,0.04); }

    .txn-table .amount {
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      text-align: right;
      color: var(--text-primary);
    }

    .txn-table .category-tag {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 6px;
      font-weight: 500;
    }
    .cat-tag-editable {
      user-select: none;
      transition: opacity 0.15s;
    }
    .cat-tag-editable:hover { opacity: 0.75; }
    .cat-override-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      z-index: 200;
      background: #fff;
      border: 1px solid #DDD9D0;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      min-width: 130px;
      padding: 4px 0;
      overflow: hidden;
    }
    .cat-override-option {
      font-size: 11px;
      font-weight: 500;
      padding: 6px 12px;
      cursor: pointer;
      transition: background 0.1s;
      white-space: nowrap;
    }
    .cat-override-option:hover { background: #F5F1EA; }
    .cat-override-option.selected { background: #F0EDE5; font-weight: 700; }

    /* Scroll targets get breathing room so their header isn't clipped */
    .scroll-target { scroll-margin-top: 24px; }

    /* Highlight pulse when a cashflow button jumps to a section */
    @keyframes scroll-flash {
      0% { box-shadow: 0 0 0 0 rgba(42, 94, 58, 0); background-color: transparent; }
      25% { box-shadow: 0 0 0 6px rgba(42, 94, 58, 0.18); background-color: rgba(42, 94, 58, 0.07); }
      100% { box-shadow: 0 0 0 0 rgba(42, 94, 58, 0); background-color: transparent; }
    }
    .scroll-flash { animation: scroll-flash 1.6s ease-out; border-radius: 12px; }

    .parse-warning {
      background: #FBF4E6;
      border: 1px solid #E8C97A;
      color: #5A4210;
      border-radius: 10px;
      padding: 12px 14px;
      margin: 16px 0 4px;
      font-size: 13px;
      line-height: 1.45;
    }
    .parse-warning em { font-style: italic; font-weight: 600; }

    .show-all-txn-btn {
      display: block;
      margin: 10px auto 0;
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      background: var(--accent-light);
      border: 1px solid var(--accent);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .show-all-txn-btn:hover { background: #D9ECDF; }

    .cat-chip-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 14px; }
    .cat-chip { font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 20px; border: 1px solid; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .cat-chip:hover { opacity: 0.8; }

    .recurring-list { display: flex; flex-direction: column; gap: 8px; }
    .recurring-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; }
    .recurring-main { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
    .recurring-name { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .recurring-meta { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .recurring-amt { font-size: 13px; font-weight: 600; }
    .recurring-freq { font-size: 11px; color: var(--text-muted); }

    .merchant-list { display: flex; flex-direction: column; gap: 4px; }
    .merchant-item { position: relative; padding: 10px 12px; border-radius: 8px; overflow: hidden; }
    .merchant-bar { position: absolute; top: 0; left: 0; bottom: 0; border-radius: 8px; transition: width 0.4s ease; }
    .merchant-row { position: relative; display: flex; justify-content: space-between; align-items: center; z-index: 1; }
    .merchant-name { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 50%; }
    .merchant-stats { font-size: 11px; color: var(--text-secondary); text-align: right; }

    .txn-search-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
    .txn-search { flex: 1; min-width: 180px; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; background: var(--surface); color: var(--text-primary); outline: none; transition: border-color 0.15s; }
    .txn-search:focus { border-color: var(--accent); }
    .txn-search::placeholder { color: var(--text-muted); }
    .txn-filter-info { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
    .txn-clear-btn { font-size: 10px; padding: 2px 8px; border: 1px solid var(--border); border-radius: 12px; background: var(--surface); color: var(--text-secondary); cursor: pointer; }
    .txn-clear-btn:hover { background: var(--surface-hover); }
    .detail-sublabel { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }

    @media (max-width: 600px) {
      .container { padding: 0 12px; }
      .cashflow-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }
      .cf-amount { font-size: 16px; }
      .txn-table th, .txn-table td { padding: 6px 4px; font-size: 11px; }
      .recurring-item { flex-direction: column; align-items: flex-start; gap: 4px; }
      .merchant-name { max-width: 40%; }
      .cat-chip { font-size: 10px; padding: 3px 7px; }
      .hero-insight { font-size: 18px; }
      h1 { font-size: 32px; }
      h2 { font-size: 22px; }
      .upload-cards { grid-template-columns: 1fr; }
      .add-more-cols { grid-template-columns: 1fr; }
      .cat-override-dropdown { position: fixed; left: 10px; right: 10px; top: auto; bottom: 20px; min-width: auto; z-index: 999; }
      .budget-bar-label { min-width: 48px; font-size: 11px; }
      .budget-bar-info { min-width: 60px; font-size: 11px; }
      .heatmap-cell { width: 11px; height: 11px; }
      .heatmap-grid { gap: 2px; }
      .dow-grid { height: 80px; }
      .personality-card { padding: 16px; }
      .personality-label { font-size: 16px; }
    }

    /* Cash flow summary grid */
    .cashflow-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px;
      margin: 20px 0 8px;
    }

    .cashflow-item {
      background: var(--surface);
      border-radius: 12px;
      padding: 14px 12px;
      text-align: center;
      border: 1px solid var(--border);
      border-top-width: 3px;
    }

    .cashflow-item.cf-income  { border-top-color: #2A7848; }
    .cashflow-item.cf-spend   { border-top-color: #8A3030; }
    .cashflow-item.cf-savings { border-top-color: #2A5E3A; }
    .cashflow-item.cf-cc      { border-top-color: #2A4A7A; }
    .cashflow-item.cf-net-pos { border-top-color: #2A7848; }
    .cashflow-item.cf-net-neg { border-top-color: #8A6020; }

    .cf-label {
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .cf-amount {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }

    .cf-net-pos .cf-amount { color: #2A7848; }
    .cf-net-neg .cf-amount { color: #8A6020; }

    .cashflow-item[data-clickable] {
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .cashflow-item[data-clickable]:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }
    .cf-caret {
      font-size: 9px;
      color: var(--text-muted);
      margin-top: 4px;
      opacity: 0.7;
    }

    /* Add more statements */
    .add-more-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .add-more-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 14px;
    }
    .add-more-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }
    @media (max-width: 480px) {
      .add-more-cols { grid-template-columns: 1fr; }
    }
    .add-more-zone {
      border: 1.5px dashed var(--border);
      border-radius: 10px;
      padding: 14px 10px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .add-more-zone:hover { border-color: var(--accent); background: rgba(42,94,58,0.05); }
    .add-more-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }
    .add-more-zone-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; }
    .add-more-zone-hint { font-size: 11px; color: var(--text-muted); }
    .add-more-zone-files { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
    .add-more-file-pill {
      background: var(--accent-light);
      color: var(--text-secondary);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 11px;
      display: flex; align-items: center; gap: 4px;
    }
    .add-more-file-pill button {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 11px; padding: 0; line-height: 1;
    }
    .add-more-actions { display: flex; gap: 10px; align-items: center; }
    .add-more-btn {
      background: var(--accent);
      border: none; border-radius: 10px;
      padding: 10px 20px; font-size: 14px; font-weight: 600;
      color: #fff; cursor: pointer; font-family: inherit;
      transition: opacity 0.2s;
    }
    .add-more-btn:disabled { opacity: 0.5; cursor: default; }
    .add-more-btn:not(:disabled):hover { opacity: 0.85; }
    .add-more-cancel {
      background: none; border: none; font-size: 13px;
      color: var(--text-muted); cursor: pointer; font-family: inherit;
    }
    .add-more-cancel:hover { color: var(--text-secondary); }
    .add-statement-btn {
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 10px 22px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.2s, color 0.2s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .add-statement-btn:hover { border-color: var(--accent); color: var(--text-primary); }

    /* Reset */
    .reset-section {
      text-align: center;
      padding: 40px 0;
      border-top: 1px solid var(--border);
    }

    .export-btn {
      background: linear-gradient(135deg, #1E4829, #2A5E3A);
      border: none;
      padding: 13px 32px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      color: #fff;
      transition: all 0.2s;
      letter-spacing: 0.02em;
    }

    .export-btn:hover {
      background: linear-gradient(135deg, #183A20, #244E30);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(30,111,66,0.35);
    }

    .reset-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      color: var(--text-secondary);
      transition: all 0.2s;
    }

    .reset-btn:hover {
      background: var(--surface-hover);
      border-color: var(--border-light);
    }

    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in { animation: fadeInUp 0.5s ease forwards; opacity: 0; }
    .fade-in-d1 { animation-delay: 0.1s; }
    .fade-in-d2 { animation-delay: 0.2s; }
    .fade-in-d3 { animation-delay: 0.3s; }
    .fade-in-d4 { animation-delay: 0.4s; }
    .fade-in-d5 { animation-delay: 0.5s; }
    .fade-in-d6 { animation-delay: 0.6s; }

    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 20px var(--cyan-glow); border-color: var(--cyan); }
      50% { box-shadow: 0 0 40px rgba(6, 182, 212, 0.25); border-color: rgba(6, 182, 212, 0.8); }
    }

    .upload-card.dragging-over { animation: glow-pulse 1.5s ease-in-out infinite; }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div id="root"></div>

  <script>
    // Configure PDF.js worker
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    // ─── CATEGORY RULES ───
    const CATEGORY_RULES = [
      { category: 'Rent', keywords: ['rent', 'landlord', 'property management', 'lease', 'edward(landlord)', 'zillow', 'apartments.com', 'avail ', 'cozy ', 'rentpayment', 'buildium', 'appfolio', 'yardi', 'zumper', 'realpage', 'hoa ', 'condo fee', 'strata', 'common charges'] },

    function isSkippable(description) {
      const lower = description.toLowerCase();
      const cleaned = cleanDesc(description).toLowerCase();
      // Also check with spaces stripped — PDFs sometimes join words (e.g. "MiscPayment RBCCREDITCARD")
      const stripped = lower.replace(/\s+/g, '');
      return SKIP_KEYWORDS.some(kw => lower.includes(kw) || cleaned.includes(kw) || stripped.includes(kw.replace(/\s+/g, '')));
    }

    // PDF text extraction often merges words without spaces (camelCase or run-ons).
    // Insert spaces at lowercase→uppercase boundaries and clean up.
    function cleanDesc(desc) {
      return desc
        .replace(/([a-z])([A-Z])/g, '$1 $2')   // camelCase: "MiscPayment" → "Misc Payment"
        .replace(/([A-Z]{2,})([A-Z][a-z])/g, '$1 $2') // "NSLSCPayment" → "NSLSC Payment"
        .replace(/\s+/g, ' ')
        .trim();
    }

    function categorize(description) {
      // Pad with space so keywords with trailing space (e.g. 'kfc ') also match at end of string
      const lower = ' ' + cleanDesc(description).toLowerCase() + ' ';
      const lowerRaw = ' ' + description.toLowerCase() + ' ';
      for (const rule of CATEGORY_RULES) {
        for (const kw of rule.keywords) {
          if (lower.includes(kw) || lowerRaw.includes(kw)) return rule.category;
        }
      }
      // Regex fallback
      for (const rule of REGEX_CATEGORY_RULES) {
        if (rule.pattern.test(lower) || rule.pattern.test(lowerRaw)) return rule.category;
      }
      return 'Other';
    }

    function isCCPayment(description) {
      const lower = description.toLowerCase();
      return CC_PAYMENT_KEYWORDS.some(kw => lower.includes(kw));

    function isIncomeSkippable(description) {
      const lower = cleanDesc(description).toLowerCase();
      return INCOME_SKIP.some(kw => lower.includes(kw));

    function categorizeIncome(description) {
      const lower = cleanDesc(description).toLowerCase();
      const lowerRaw = description.toLowerCase();
      for (const rule of INCOME_CATEGORY_RULES) {
        for (const kw of rule.keywords) {
          if (lower.includes(kw) || lowerRaw.includes(kw)) return rule.category;
        }
      }
      return 'Other Income';
    }

    // ─── DATE PARSING ───
    function parseDate(str) {
      if (!str) return null;
      const s = str.trim();
      let d = new Date(s);
      if (!isNaN(d) && d.getFullYear() >= 2020 && d.getFullYear() <= 2099) return d;
      const parts = s.split(/[\/\-\.]/);
      if (parts.length === 3) {
        const [a, b, c] = parts.map(Number);
        if (c > 1990) { d = new Date(c, a - 1, b); if (!isNaN(d)) return d; }
        if (a > 1990) { d = new Date(a, b - 1, c); if (!isNaN(d)) return d; }
      }
      // Handle "Dec7 2026", "Dec 7, 2026", "7 Dec 2026", "07-Jan-2026" etc.
      const MMAP = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
      // Mon DD YYYY
      const compactM = s.match(/^(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s*(\d{1,2}),?\s*(\d{4})$/i);
      if (compactM) {
        const mon = MMAP[compactM[1].slice(0,3).toLowerCase()];
        if (mon !== undefined) {
          d = new Date(parseInt(compactM[3],10), mon, parseInt(compactM[2],10));
          if (!isNaN(d)) return d;
        }
      }
      // DD Mon YYYY or DD-Mon-YYYY
      const ddMon = s.match(/^(\d{1,2})[\s\-]+(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*[\s,\-]+(\d{4})$/i);
      if (ddMon) {
        const mon = MMAP[ddMon[2].slice(0,3).toLowerCase()];
        if (mon !== undefined) {
          d = new Date(parseInt(ddMon[3],10), mon, parseInt(ddMon[1],10));
          if (!isNaN(d)) return d;
        }
      }
      return null;
    }

    // ─── TIME PERIOD HELPERS ───
    function describePeriod(minDate, maxDate) {
      const diffMs = maxDate - minDate;
      const diffDays = Math.round(diffMs / (1000 * 60 * 60 * 24)) + 1;
      const diffMonths = (maxDate.getFullYear() - minDate.getFullYear()) * 12 + (maxDate.getMonth() - minDate.getMonth());
      const fmt = (d) => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

      let label;
      if (diffDays <= 35) label = '~1 month';
      else if (diffMonths <= 2) label = '~2 months';
      else if (diffMonths <= 4) label = '~3 months';
      else if (diffMonths <= 7) label = '~6 months';
      else label = '~' + diffMonths + ' months';

      return {
        diffDays,
        diffMonths: Math.max(1, diffMonths),
        approxMonths: Math.max(1, Math.round(diffDays / 30.44)),
        label,
        range: fmt(minDate) + ' \u2013 ' + fmt(maxDate),
        isMultiMonth: diffDays > 45,
      };
    }

    // ─── CSV PARSER ───
    function parseCSV(text, source) {
      const result = Papa.parse(text, { header: true, skipEmptyLines: true });
      const rows = result.data;
      const transactions = [];
      const inflows = [];
      // Auto-detect CSV source from column headers
      if (source === 'auto') {
        const hdrs = (result.meta.fields || []).join(' ').toLowerCase();
        source = /withdrawal|debit|chequing|checking|deposit|savings|current.?account/i.test(hdrs) ? 'bank' : 'credit';
      }

      // Detect column names once (outside loop for performance)
      const headerKeys = rows.length > 0 ? Object.keys(rows[0]) : [];
      const hDateKey = headerKeys.find(k => /date|posted|trans/i.test(k)) || headerKeys[0];
      const hDescKey = headerKeys.find(k => /desc|narr|memo|detail|merchant|payee|name/i.test(k)) ||
                       headerKeys.find(k => !/date|amount|debit|credit|balance|posted|type|category/i.test(k));
      const hAmountKey = headerKeys.find(k => /^amount$/i.test(k));
      const hDebitKey = headerKeys.find(k => /debit|withdrawal/i.test(k));
      const hCreditKey = headerKeys.find(k => /credit|deposit/i.test(k));
      const hTypeKey = headerKeys.find(k => /^(type|transaction.?type)$/i.test(k));

      for (const row of rows) {
        const keys = Object.keys(row);
        const dateKey = hDateKey;
        const descKey = hDescKey;

        let amount = 0;
        let isDeposit = false;
        const amountKey = hAmountKey;
        const debitKey = hDebitKey;
        const creditKey = hCreditKey;
        const typeKey = hTypeKey;

        // Use Type column to detect payments/returns/credits
        const txnType = typeKey ? String(row[typeKey] || '').toLowerCase().trim() : '';
        const isReturnOrPayment = /return|refund|credit|payment|reversal/i.test(txnType);

        if (debitKey && creditKey) {
          // Separate debit/credit columns — detect which one has a value
          const dVal = parseFloat(String(row[debitKey] || '').replace(/[$,]/g, '')) || 0;
          const cVal = parseFloat(String(row[creditKey] || '').replace(/[$,]/g, '')) || 0;
          if (dVal !== 0) { amount = Math.abs(dVal); isDeposit = false; }
          else if (cVal !== 0) { amount = Math.abs(cVal); isDeposit = true; }
        } else if (amountKey) {
          amount = parseFloat(String(row[amountKey]).replace(/[$,]/g, '')) || 0;
          if (isReturnOrPayment && amount > 0) { isDeposit = true; }
          else if (source === 'bank' && amount < 0) { amount = Math.abs(amount); isDeposit = false; }
          else if (source === 'bank' && amount > 0) { isDeposit = true; }
          else if (source === 'credit' && amount < 0) { isDeposit = true; amount = Math.abs(amount); }
        } else {
          for (const k of keys) {
            if (k === dateKey || k === descKey) continue;
            const val = parseFloat(String(row[k]).replace(/[$,]/g, ''));
            if (!isNaN(val) && val !== 0) { amount = Math.abs(val); break; }
          }
        }

        const date = parseDate(row[dateKey]);
        const description = descKey ? String(row[descKey]).trim() : '';
        if (!date || !description) continue;
        if (isCCPayment(description)) continue;

        amount = Math.abs(amount);
        if (amount <= 0) continue;
        const roundedAmt = Math.round(amount * 100) / 100;

        if (source === 'bank' && isDeposit) {
          // Bank deposit → capture as inflow (income)
          if (!isIncomeSkippable(description) && !isSkippable(description)) {
            inflows.push({
              date, description,
              amount: roundedAmt,
              source, category: categorizeIncome(description),
            });
          }
        } else {
          if (!isSkippable(description)) {
            transactions.push({
              date, description,
              amount: roundedAmt,
              source: source === 'credit' ? 'credit' : source,
              category: categorize(description),
            });
          }
        }
      }
      return { transactions, inflows };
    }

      const transactions = [];

      const MONTHS = { jan: 0, feb: 1, mar: 2, apr: 3, may: 4, jun: 5, jul: 6, aug: 7, sep: 8, oct: 9, nov: 10, dec: 11 };
      const MONTH_NAMES_FULL = 'January|February|March|April|May|June|July|August|September|October|November|December';
      const amountRegex = /^-?\$?\d{1,3}(?:,\d{3})*\.\d{2}$/;
      const parseAmt = (s) => parseFloat(s.replace(/[$,]/g, ''));

      // Collect all text items with positions across all pages
      const pageData = [];
      let fullText = '';
      for (let i = 0; i < pdf.numPages; i++) {
        const page = await pdf.getPage(i + 1);
        const viewport = page.getViewport({ scale: 1 });
        const content = await page.getTextContent();
        const items = content.items
          .filter(it => it.str && it.str.trim())
          .map(it => ({
            str: it.str.trim(),
            x: it.transform[4],
            y: viewport.height - it.transform[5], // top-origin
            width: it.width || 0,
          }));
        pageData.push(items);
        fullText += ' ' + items.map(it => it.str).join(' ');
      }

      // ── Parse statement period (handles all known bank/CC header formats) ──
      // Amex:    "Opening Date Dec08, 2025 Closing Date Jan07, 2026"
      // RBC MC:  "STATEMENT FROM DEC 09, 2025 TO JAN 8, 2026"  (cross-year, two explicit years)
      // RBC MC:  "STATEMENT FROM JAN 09 TO FEB 9, 2026"         (same year, one year at end)
      // RBC Bank:"From February 12, 2026 to March 12, 2026"
      // RBC Bank:"For the period December 12, 2025 to January 12, 2026"
      let periodStartYear = null, periodEndYear = null, periodStartMonth = null, periodEndMonth = null;
      const MON_ABBR_RE = 'Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec';
      const MON_EITHER_RE = MONTH_NAMES_FULL + '|' + MON_ABBR_RE;
      const MONTH_IDX = {
        january:0,february:1,march:2,april:3,may:4,june:5,july:6,august:7,september:8,october:9,november:10,december:11,
        jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11
      };
      // Try two-date-with-two-years pattern first
      const twoYrPat = new RegExp(
        '(' + MON_EITHER_RE + ')\\s*(\\d{1,2})[,\\s]+(\\d{4}).{0,60}?(' + MON_EITHER_RE + ')\\s*(\\d{1,2})[,\\s]+(\\d{4})', 'i'
      );
      const twoYrM = fullText.match(twoYrPat);
      if (twoYrM) {
        periodStartMonth = MONTH_IDX[twoYrM[1].toLowerCase()];
        periodStartYear  = parseInt(twoYrM[3], 10);
        periodEndMonth   = MONTH_IDX[twoYrM[4].toLowerCase()];
        periodEndYear    = parseInt(twoYrM[6], 10);
      } else {
        // Try two-date-with-one-year pattern (e.g. "JAN 09 TO FEB 9, 2026")
        const oneYrPat = new RegExp(
          '(' + MON_EITHER_RE + ')\\s*(\\d{1,2}).{0,40}?(' + MON_EITHER_RE + ')\\s*(\\d{1,2})[,\\s]+(\\d{4})', 'i'
        );
        const oneYrM = fullText.match(oneYrPat);
        if (oneYrM) {
          periodStartMonth = MONTH_IDX[oneYrM[1].toLowerCase()];
          periodEndMonth   = MONTH_IDX[oneYrM[3].toLowerCase()];
          periodEndYear    = parseInt(oneYrM[5], 10);
          // If start month is later in the year than end month, it crossed a year boundary
          periodStartYear  = periodStartMonth > periodEndMonth ? periodEndYear - 1 : periodEndYear;
        } else {
          // Try numeric date range: "12/01/2025 - 01/01/2026" or "2025-12-01 through 2026-01-01"
          const numPeriodPat = /(\d{1,2})[\/-](\d{1,2})[\/-](\d{4}).{1,30}?(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})/;
          const numPM = fullText.match(numPeriodPat);
          if (numPM) {
            periodStartMonth = parseInt(numPM[1], 10) - 1;
            periodStartYear = parseInt(numPM[3], 10);
            periodEndMonth = parseInt(numPM[4], 10) - 1;
            periodEndYear = parseInt(numPM[6], 10);
          } else {
            // Last resort: grab any 4-digit year
            const anyYr = fullText.match(/\b(20\d{2})\b/);
            const yr = anyYr ? parseInt(anyYr[1], 10) : new Date().getFullYear();
            periodStartYear = periodEndYear = yr;
            periodStartMonth = 0; periodEndMonth = 11;
          }
        }
      }
      // Given a parsed month index (0=Jan), return the correct calendar year.
      // Cross-year statements (e.g. Dec 2025 → Jan 2026): months on the "late" side get startYear,
      // months that rolled over into the new year get endYear.
      const yearForMonth = (monthIdx) => {
        if (periodStartYear === periodEndYear) return periodStartYear;
        return monthIdx >= periodStartMonth ? periodStartYear : periodEndYear;
      };
      const statementYear = periodEndYear;

      // Detect if this is a bank-style statement with Withdrawals/Deposits columns (EN + FR)
      const hasBankColumns = (/Withdrawals?\s*\(?\$?\)?/i.test(fullText) && /Deposits?\s*\(?\$?\)?/i.test(fullText))
        || (/Retraits?\s*\(?\$?\)?/i.test(fullText) && /D[eé]p[oô]ts?\s*\(?\$?\)?/i.test(fullText))
        || (/\bDebits?\b/i.test(fullText) && /\bCredits?\b/i.test(fullText) && /\bBalance\b/i.test(fullText))
        || (/\bCharges?\b/i.test(fullText) && /\bPayments?\b/i.test(fullText) && /\bBalance\b/i.test(fullText));
      // Auto-detect source type when caller passed 'auto'
      if (source === 'auto') source = hasBankColumns ? 'bank' : 'credit';

      // Helper: group items into horizontal "lines" by y proximity
      const groupLines = (items) => {
        const sorted = [...items].sort((a, b) => a.y - b.y || a.x - b.x);
        const lines = [];
        for (const it of sorted) {
          const line = lines.find(l => Math.abs(l.y - it.y) < 3.5);
          if (line) { line.items.push(it); line.y = (line.y + it.y) / 2; }
          else lines.push({ y: it.y, items: [it] });
        }
        lines.forEach(l => l.items.sort((a, b) => a.x - b.x));
        return lines;
      };

      // ─── BANK COLUMN-AWARE PARSER ───
      if (hasBankColumns) {
        const dateItemRegex = /^(\d{1,2})\s*(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)$/i;
        const numDateRegex = /^(\d{1,2})[\/-](\d{1,2})(?:[\/-](\d{2,4}))?$/;

        // State persists ACROSS pages so multi-line entries spanning a page break work correctly
        let currentDate = null;
        let descBuffer = [];
        let pendingWithdrawal = null;

        const flushTxn = () => {
          if (currentDate && pendingWithdrawal !== null && descBuffer.length) {
            const description = cleanDesc(descBuffer.join(' ').replace(/\s+/g, ' ').trim());
            if (description && !isSkippable(description)) {
              const amt = Math.round(Math.abs(pendingWithdrawal) * 100) / 100;
              if (amt > 0 && amt < 100000) {
                transactions.push({
                  date: new Date(currentDate),
                  description,
                  amount: amt,
                  source,
                  category: categorize(description),
                });
              }
            }
          }
          descBuffer = [];
          pendingWithdrawal = null;
        };

        for (const items of pageData) {
          const lines = groupLines(items);
          // Find header row with Withdrawals + Deposits on this page
          let colDate = null, colDesc = null, colW = null, colD = null, colBal = null;
          let headerIdx = -1;
          for (let li = 0; li < lines.length; li++) {
            const strs = lines[li].items.map(i => i.str).join(' ');
            const hasWD = /Withdrawals?|Debits?|Charges?/i.test(strs) && /Deposits?|Credits?|Payments?/i.test(strs);
            if (hasWD) {
              for (const it of lines[li].items) {
                if (/^Date$/i.test(it.str) && colDate === null) colDate = it.x;
                else if (/^(Description|Details?|Particulars?|Narrative)$/i.test(it.str) && colDesc === null) colDesc = it.x;
                else if (/Withdrawals?|Debits?|Charges?/i.test(it.str) && colW === null) colW = it.x;
                else if (/Deposits?|Credits?|Payments?/i.test(it.str) && colD === null) colD = it.x;
                else if (/Balance/i.test(it.str) && colBal === null) colBal = it.x;
              }
              headerIdx = li;
              break;
            }
          }
          if (headerIdx === -1 || colW === null || colD === null) continue;
          if (colDate === null) colDate = colW - 280;
          if (colDesc === null) colDesc = colW - 230;

          const wdBoundary = (colW + colD) / 2;
          const depRightBound = colBal !== null ? colBal - 5 : colD + 120;

          for (let li = headerIdx + 1; li < lines.length; li++) {
            const line = lines[li];
            const joined = line.items.map(i => i.str).join(' ');
            if (/Closing\s*Balance/i.test(joined)) { flushTxn(); break; }
            if (/Opening\s*Balance/i.test(joined)) continue;
            if (/Details of your account activity/i.test(joined)) continue;

            // Look for date item in the narrow date column (left of description)
            let lineDate = null;
            for (const it of line.items) {
              if (it.x < colDesc - 3) {
                const m = it.str.replace(/\s+/g, '').match(dateItemRegex);
                if (m) {
                  const key = m[2].slice(0, 3).toLowerCase();
                  if (MONTHS[key] !== undefined) {
                    lineDate = new Date(yearForMonth(MONTHS[key]), MONTHS[key], parseInt(m[1], 10));
                    break;
                  }
                }
                // Also try numeric MM/DD or MM/DD/YYYY
                const nm = it.str.replace(/\s+/g, '').match(numDateRegex);
                if (nm) {
                  const mm = parseInt(nm[1], 10), dd = parseInt(nm[2], 10);
                  const yy = nm[3] ? (nm[3].length === 2 ? 2000 + parseInt(nm[3], 10) : parseInt(nm[3], 10)) : yearForMonth(mm - 1);
                  if (mm >= 1 && mm <= 12 && dd >= 1 && dd <= 31) {
                    lineDate = new Date(yy, mm - 1, dd);
                    break;
                  }
                }
              }
            }

            // Amounts: classify by right edge position relative to column boundaries
            let lineWithdrawal = null, lineDeposit = null;
            for (const it of line.items) {
              if (amountRegex.test(it.str)) {
                const amt = parseAmt(it.str);
                const rightEdge = it.x + (it.width || 0);
                if (rightEdge >= colW - 5 && rightEdge < wdBoundary + 5) {
                  lineWithdrawal = amt;
                } else if (rightEdge >= wdBoundary - 5 && rightEdge < depRightBound + 5) {
                  lineDeposit = amt;
                }
              }
            }

            // Description text: items between desc col and withdrawal col, not numeric
            const descItems = line.items.filter(it =>
              it.x >= (colDesc - 8) && it.x < (colW - 15) && !amountRegex.test(it.str)
            );

            if (lineDate) {
              flushTxn();
              currentDate = lineDate;
            }

            if (descItems.length) {
              descBuffer.push(descItems.map(i => i.str).join(' '));
            }

            if (lineWithdrawal !== null) {
              pendingWithdrawal = lineWithdrawal;
              flushTxn();
            } else if (lineDeposit !== null) {
              // Income — capture as inflow then reset buffer
              const incDesc = cleanDesc(descBuffer.join(' ').replace(/\s+/g, ' ').trim());
              if (incDesc && currentDate && !isIncomeSkippable(incDesc)) {
                const incAmt = Math.round(lineDeposit * 100) / 100;
                if (incAmt > 0 && incAmt < 1000000) {
                  inflows.push({
                    date: new Date(currentDate),
                    description: incDesc,
                    amount: incAmt,
                    source,
                    category: categorizeIncome(incDesc),
                  });
                }
              }
              descBuffer = [];
              pendingWithdrawal = null;
            }
          }
        }
        flushTxn(); // catch any trailing entry
        if (transactions.length > 0 || inflows.length > 0) return { transactions, inflows };
      }

      // ─── FALLBACK: line-based generic parser (credit cards etc.) ───
      const dateRegex = /(\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4}|\d{4}[\/\-\.]\d{1,2}[\/\-\.]\d{1,2}|(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s*\d{1,2},?\s*\d{0,4}|\d{1,2}\s*(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s*\d{0,4})/i;
      const amtRegexG = /-?\$?\d{1,3}(?:,\d{3})*\.\d{2}/g;

      for (const items of pageData) {
        const lines = groupLines(items);
        for (const line of lines) {
          const text = line.items.map(i => i.str).join(' ');
          const trimmed = text.trim();
          if (!trimmed || trimmed.length < 8) continue;

          const dateMatch = trimmed.match(dateRegex);
          if (!dateMatch) continue;

          let dateStr = dateMatch[0];
          // If year missing, append the correct year (handles cross-year statements like Dec 2025 → Jan 2026)
          // Matches: "DEC 16", "16 Dec", "Dec7" (Amex no-space format), "Jan9" etc.
          if (!/\d{4}/.test(dateStr) && /(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[\s\/\-]?\d{1,2}|\d{1,2}[\s\/\-](?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)/i.test(dateStr)) {
            const mMatch = dateStr.match(/Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec/i);
            const mKey = mMatch ? mMatch[0].slice(0,3).toLowerCase() : null;
            const mIdx = mKey && MONTHS[mKey] !== undefined ? MONTHS[mKey] : null;
            const resolvedYear = mIdx !== null ? yearForMonth(mIdx) : statementYear;
            dateStr = dateStr.trim() + ' ' + resolvedYear;
          }
          const date = parseDate(dateStr);
          if (!date || isNaN(date)) continue;

          const amts = [];
          let m;
          amtRegexG.lastIndex = 0; // reset global regex state
          while ((m = amtRegexG.exec(trimmed)) !== null) amts.push(parseAmt(m[0]));
          if (!amts.length) continue;

          // Always use the FIRST amount — it's the transaction amount.
          // Trailing amounts on the same line are sidebar info (credit limit, balance, min payment).
          const firstAmt = trimmed.match(/-?\$?\d{1,3}(?:,\d{3})*\.\d{2}/);
          let amount = firstAmt ? parseAmt(firstAmt[0]) : amts[0];
          const dateEnd = trimmed.indexOf(dateMatch[0]) + dateMatch[0].length;
          const amtStart = firstAmt ? trimmed.indexOf(firstAmt[0]) : trimmed.length;

          // Strip any leading posting-date token (e.g. "DEC 29 " or "Jan8 " before merchant name)
          let rawDesc = trimmed.substring(dateEnd, amtStart).replace(/^[\s\-\*]+|[\s\-\*]+$/g, '').trim();
          rawDesc = rawDesc.replace(/^(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s*\d{1,2}\s*/i, '').trim();
          let description = cleanDesc(rawDesc);
          if (!description || description.length < 2) continue;
          if (isSkippable(description)) continue;
          if (isCCPayment(description)) continue; // skip CC payment entries on CC statements

          amount = Math.abs(amount);
          if (amount <= 0 || amount > 100000) continue;

          transactions.push({
            date, description,
            amount: Math.round(amount * 100) / 100,
            source, category: categorize(description),
          });
        }
      }

      return { transactions, inflows };
    }

    // ─── FILE READER ───
    async function readFile(file, source) {
      const name = file.name.toLowerCase();
      let result;
      try {
        if (name.endsWith('.pdf')) {
          const buffer = await file.arrayBuffer();
          result = await parsePDF(buffer, source);
        } else {
          const text = await file.text();
          result = parseCSV(text, source);
        }
      } catch (err) {
        console.error('[FRC] Error parsing "' + file.name + '":', err);
        result = { transactions: [], inflows: [] };
      }
      // ── Diagnostics: help catch unknown bank formats early ──
      const txnCount = (result.transactions || []).length;
      const inflowCount = (result.inflows || []).length;
      if (txnCount === 0 && inflowCount === 0) {
        console.warn('[FRC] No transactions parsed from "' + file.name + '". This may be a bank format we haven\u2019t seen yet. Please share the file so we can add support.');
      } else if (txnCount < 3) {
        console.warn('[FRC] Only ' + txnCount + ' transaction(s) from "' + file.name + '" \u2014 likely incomplete parse.');
      }
      const otherCount = (result.transactions || []).filter(t => t.category === 'Other').length;
      if (txnCount > 5 && otherCount / txnCount > 0.5) {
        console.warn('[FRC] ' + otherCount + '/' + txnCount + ' transactions in "' + file.name + '" landed in Other \u2014 consider adding keyword rules.');
      }
      result.diagnostics = { fileName: file.name, txnCount, inflowCount, otherCount };
      return result;
    }
