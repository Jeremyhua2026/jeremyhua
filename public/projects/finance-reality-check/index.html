    // ─── INSIGHT ENGINE ───
    function generateInsights(rawTransactions, inflows = []) {
      // ── Deduplicate transactions ──
      // Some PDFs (e.g. Amex) list each transaction twice: once in the main ledger and once
      // in a rewards/points summary with a different date format (posting date vs transaction date).
      // Dedup: same amount + same core description + dates within 4 days = duplicate, keep first.
      const DAY_MS = 24 * 60 * 60 * 1000;
      const normDesc = (d) => d.toLowerCase()
        .replace(/^(?:jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)\s*\d{1,2}\s*/i, '') // strip leading date token
        .replace(/\s+/g, ' ').trim();
      const sorted = [...rawTransactions].sort((a, b) => a.date - b.date);
      const transactions = [];
      for (const t of sorted) {
        const tAmt = Math.round(t.amount * 100);
        const tDesc = normDesc(t.description);
        const isDup = transactions.some(k =>
          Math.round(k.amount * 100) === tAmt &&
          Math.abs(k.date - t.date) <= 4 * DAY_MS &&
          (normDesc(k.description).slice(0, 15) === tDesc.slice(0, 15))
        );
        if (!isDup) transactions.push(t);
      }

      const allDates = [
        ...transactions.map(t => t.date.getTime()),
        ...inflows.map(t => t.date.getTime()),
      ];
      const minDate = new Date(Math.min(...allDates));
      const maxDate = new Date(Math.max(...allDates));
      const period = describePeriod(minDate, maxDate);
      const months = period.approxMonths;
      const isMulti = period.isMultiMonth;

      // ── Outflow breakdown ──
      const total = transactions.reduce((s, t) => s + t.amount, 0);
      const monthlyTotal = total / months;
      const dailyAvg = total / Math.max(period.diffDays, 1);

      const byCategory = {};
      transactions.forEach(t => { byCategory[t.category] = (byCategory[t.category] || 0) + t.amount; });

      // Separate "lifestyle" spend from savings/CC buckets for hero
      const savingsAmt = byCategory['Savings'] || 0;
      const ccPayAmt = byCategory['CC Payment'] || 0;
      const lifestyleTotal = total - savingsAmt - ccPayAmt;
      const hasCCStatement = transactions.some(t => t.source === 'credit');

      // ── Income breakdown ──
      const totalIncome = inflows.reduce((s, t) => s + t.amount, 0);
      const byIncomeSource = {};
      inflows.forEach(t => { byIncomeSource[t.category] = (byIncomeSource[t.category] || 0) + t.amount; });
      const sortedIncome = Object.entries(byIncomeSource).sort((a, b) => b[1] - a[1]);

      // Net cash flow (only meaningful when income is available from bank statement)
      const netFlow = totalIncome > 0 ? totalIncome - total : null;
      const savingsRate = totalIncome > 0 ? Math.round((savingsAmt / totalIncome) * 100) : null;

      const byMerchant = {};
      transactions.forEach(t => {
        const key = t.description.toUpperCase().replace(/[^A-Z\s]/g, '').trim();
        byMerchant[key] = (byMerchant[key] || 0) + t.amount;
      });
      const sortedMerchants = Object.entries(byMerchant).sort((a, b) => b[1] - a[1]);
      const top5Total = sortedMerchants.slice(0, 5).reduce((s, m) => s + m[1], 0);
      const top5Pct = total > 0 ? Math.round((top5Total / total) * 100) : 0;

      let weekendSpend = 0, weekdaySpend = 0, weekendDays = 0, weekdayDays = 0;
      const daySpends = {};
      transactions.forEach(t => {
        const day = t.date.getDay();
        if (day === 0 || day === 6) weekendSpend += t.amount;
        else weekdaySpend += t.amount;
        daySpends[t.date.toDateString()] = (daySpends[t.date.toDateString()] || 0) + t.amount;
      });
      Object.keys(daySpends).forEach(ds => {
        const d = new Date(ds);
        if (d.getDay() === 0 || d.getDay() === 6) weekendDays++; else weekdayDays++;
      });
      const weekendAvg = weekendDays > 0 ? weekendSpend / weekendDays : 0;
      const weekdayAvg = weekdayDays > 0 ? weekdaySpend / weekdayDays : 0;
      const weekendRatio = weekdayAvg > 0 ? weekendAvg / weekdayAvg : 0;

      const deliveryKw = ['uber eats', 'ubereats', 'doordash', 'skip the dishes', 'skipthedishes', 'grubhub', 'postmates'];
      const deliveryTotal = transactions.filter(t => deliveryKw.some(kw => t.description.toLowerCase().includes(kw))).reduce((s, t) => s + t.amount, 0);
      const deliveryMo = deliveryTotal / months;
      const subTotal = byCategory['Subscriptions'] || 0;
      const subMo = subTotal / months;

      // Exclude Savings and CC Payment from category chart (show separately)
      const displayCats = Object.entries(byCategory).filter(([k]) => k !== 'Savings' && k !== 'CC Payment');
      const sortedCats = displayCats.sort((a, b) => b[1] - a[1]);
      const topCat = sortedCats[0] || ['Other', 0];
      const topCatPct = lifestyleTotal > 0 ? Math.round((topCat[1] / lifestyleTotal) * 100) : 0;

      const weeklySpends = {};
      transactions.forEach(t => {
        const ws = new Date(t.date); ws.setDate(ws.getDate() - ws.getDay());
        const key = ws.toISOString().split('T')[0];
        weeklySpends[key] = (weeklySpends[key] || 0) + t.amount;
      });
      const monthlySpends = {};
      transactions.forEach(t => {
        const key = t.date.toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
        monthlySpends[key] = (monthlySpends[key] || 0) + t.amount;
      });

      // Groceries now has its own category, so total is exact
      const groceryTotal = byCategory['Groceries'] || 0;
      const eatingOut = byCategory['Food'] || 0;
      const coffeeKw = ['starbucks', 'tim horton', 'coffee'];
      const coffeeTotal = transactions.filter(t => coffeeKw.some(kw => t.description.toLowerCase().includes(kw))).reduce((s, t) => s + t.amount, 0);
      const coffeeMo = coffeeTotal / months;

      // ── HERO ──
      let hero;
      if (totalIncome > 0 && total > 0) {
        // Full picture: income vs spending
        if (savingsAmt > 0) {
          hero = 'Earned $' + formatNum(totalIncome) + ' \u00B7 Spent $' + formatNum(lifestyleTotal) + ' \u00B7 Saved $' + formatNum(savingsAmt) + (savingsRate ? ' (' + savingsRate + '%)' : '');
        } else {
          hero = 'You brought in $' + formatNum(totalIncome) + ' and spent $' + formatNum(total) + ' \u2014 net ' + (netFlow >= 0 ? '+' : '') + '$' + formatNum(netFlow);
        }
      } else if (isMulti) {
        hero = 'You averaged $' + formatNum(monthlyTotal) + '/month over ' + months + ' months';
      } else {
        const rentAmt = byCategory['Rent'] || 0;
        if (savingsAmt > 0) {
          hero = '$' + formatNum(lifestyleTotal) + ' in lifestyle costs + $' + formatNum(savingsAmt) + ' to savings this period';
        } else if (rentAmt > 0) {
          hero = '$' + formatNum(total) + ' out — $' + formatNum(rentAmt) + ' rent, $' + formatNum(total - rentAmt) + ' other';
        } else {
          hero = '$' + formatNum(total) + ' in total outflows this statement period';
        }
      }

      // ── INSIGHTS ──
      const candidates = [];
      if (savingsRate !== null && savingsRate > 0) candidates.push({ w: 90, t: 'You saved ' + savingsRate + '% of your income ($' + formatNum(savingsAmt) + ')' });
      if (savingsRate !== null && savingsRate < 10 && savingsAmt === 0) candidates.push({ w: 80, t: 'No savings detected this period \u2014 consider automating a transfer' });
      if (subMo > 80) candidates.push({ w: subMo * 2, t: 'Subscriptions cost you ~$' + formatNum(subMo) + '/month' });
      if (weekendRatio > 1.5) candidates.push({ w: weekendRatio * 50, t: 'You spend ' + weekendRatio.toFixed(1) + 'x more on weekends than weekdays' });
      if (topCatPct > 30 && topCat[0] !== 'Rent') candidates.push({ w: topCatPct, t: topCat[0] + ' is your biggest lifestyle category at ' + topCatPct + '%' });
      if (top5Pct > 40) candidates.push({ w: top5Pct, t: '5 merchants make up ' + top5Pct + '% of your spending' });
      if (deliveryMo > 100) candidates.push({ w: deliveryMo * 1.5, t: 'Food delivery runs ~$' + formatNum(deliveryMo) + '/month' });
      if (eatingOut > 0 && groceryTotal > 0) candidates.push({ w: eatingOut / months, t: 'You spend ' + (eatingOut / groceryTotal).toFixed(1) + 'x more dining out ($' + formatNum(eatingOut/months) + '/mo) than on groceries ($' + formatNum(groceryTotal/months) + '/mo)' });
      if (coffeeMo > 20) candidates.push({ w: coffeeMo * 2, t: 'Coffee adds up to ~$' + formatNum(coffeeMo) + '/month' });
      if (!hasCCStatement && ccPayAmt > 0) candidates.push({ w: ccPayAmt, t: '$' + formatNum(ccPayAmt) + ' went to credit card payments \u2014 upload your CC statement for a full breakdown' });
      if (isMulti) {
        const mKeys = Object.keys(monthlySpends);
        const mVals = Object.values(monthlySpends);
        if (mVals.length >= 2) {
          const change = ((mVals[mVals.length - 1] - mVals[0]) / mVals[0]) * 100;
          if (Math.abs(change) > 10) candidates.push({ w: Math.abs(change), t: 'Spending trended ' + (change > 0 ? 'up' : 'down') + ' ' + Math.abs(Math.round(change)) + '% from ' + mKeys[0] + ' to ' + mKeys[mKeys.length - 1] });
        }
      }
      candidates.sort((a, b) => b.w - a.w);
      // Dedup candidates by text AND by topic theme (prevent two food-related, two savings, etc.)
      const themeOf = (t) => {
        const s = t.toLowerCase();
        if (s.includes('saved') || s.includes('saving')) return 'savings';
        if (s.includes('eating out') || s.includes('grocer') || s.includes('delivery') || s.includes('coffee')) return 'food';
        if (s.includes('subscription')) return 'subs';
        if (s.includes('weekend')) return 'weekend';
        if (s.includes('merchant')) return 'merchant';
        if (s.includes('biggest') || s.includes('lifestyle category')) return 'topcat';
        if (s.includes('trended')) return 'trend';
        return t; // fallback: exact text
      };
      const seenText = new Set(), seenTheme = new Set();
      const uniqueCandidates = [];
      for (const c of candidates) {
        const th = themeOf(c.t);
        if (seenText.has(c.t) || seenTheme.has(th)) continue;
        seenText.add(c.t); seenTheme.add(th);
        uniqueCandidates.push(c);
      }
      const insights = uniqueCandidates.slice(0, 4).map(i => i.t);
      if (insights.length < 2) {
        const avgLine = 'Your average spend is ~$' + formatNum(monthlyTotal) + '/month';
        if (!insights.includes(avgLine)) insights.push(avgLine);
        if (sortedMerchants.length > 0) {
          const topLine = 'Top merchant: ' + sortedMerchants[0][0] + ' at $' + formatNum(sortedMerchants[0][1] / months) + '/month';
          if (!insights.includes(topLine)) insights.push(topLine);
        }
      }

      // ── FOCUS (prefer themes NOT already covered by insights) ──
      const insightThemes = new Set(insights.map(themeOf));
      const focusOptions = [];
      if (savingsAmt === 0 && ccPayAmt === 0 && !hasCCStatement) focusOptions.push({ theme: 'savings', t: 'No savings captured this period \u2014 even automating $100/month compounds significantly' });
      if (deliveryMo > 150) focusOptions.push({ theme: 'food', t: 'Your food delivery spend is ~$' + formatNum(deliveryMo) + '/month' });
      if (subMo > 120) focusOptions.push({ theme: 'subs', t: 'You\u2019re paying ~$' + formatNum(subMo) + '/month in subscriptions' });
      if (weekendRatio > 2) focusOptions.push({ theme: 'weekend', t: 'Your weekend spending is ' + weekendRatio.toFixed(1) + 'x your weekday rate' });
      if (topCatPct > 40 && topCat[0] !== 'Rent') focusOptions.push({ theme: 'topcat', t: topCat[0] + ' dominates at ' + topCatPct + '% of lifestyle spending' });
      focusOptions.push({ theme: 'topcat2', t: 'Your biggest category is ' + topCat[0].toLowerCase() + ' at ~$' + formatNum(topCat[1] / months) + '/month' });
      // Pick the first focus whose theme isn't already in insights; fall back to first option
      const preferred = focusOptions.find(f => !insightThemes.has(f.theme));
      const focus = (preferred || focusOptions[0]).t;

      // ── ACTION ──
      let action;
      if (subMo > 120) action = 'Review your subscriptions \u2014 cutting 2 could save ~$' + formatNum(subMo * 0.2) + '/month';
      else if (deliveryMo > 150) action = 'Try a weekly food delivery cap of $' + Math.round(deliveryMo / 4 * 0.6) + ' \u2014 could save ~$' + formatNum(deliveryMo * 0.4) + '/month';
      else if (weekendRatio > 1.8) action = 'Set a weekend spending limit \u2014 even $' + formatNum(weekendAvg * 0.7) + '/day on weekends would help';
      else if (coffeeMo > 30) action = 'Making coffee at home 3 days a week could save ~$' + formatNum(coffeeMo * 0.5) + '/month';
      else action = 'Track your top 3 merchants for a week \u2014 awareness alone changes behavior';

      // ── RECURRING CHARGE DETECTION ──
      // Group by normalized merchant, then check for charges appearing in 2+ distinct months
      const recurringMap = {};
      transactions.forEach(t => {
        const key = t.description.toUpperCase().replace(/[^A-Z\s]/g, '').replace(/\s+/g, ' ').trim().slice(0, 30);
        if (!key || key.length < 3) return;
        if (!recurringMap[key]) recurringMap[key] = [];
        recurringMap[key].push(t);
      });
      const recurring = [];
      for (const [merchant, txns] of Object.entries(recurringMap)) {
        const monthSet = new Set(txns.map(t => t.date.getFullYear() * 12 + t.date.getMonth()));
        if (monthSet.size < 2) continue;
        // Check if amounts are consistent (within 20% of median)
        const amounts = txns.map(t => t.amount).sort((a, b) => a - b);
        const median = amounts[Math.floor(amounts.length / 2)];
        const consistent = amounts.filter(a => Math.abs(a - median) / median < 0.25);
        if (consistent.length < 2) continue;
        const avgAmt = consistent.reduce((s, a) => s + a, 0) / consistent.length;
        recurring.push({
          merchant: txns[0].description, // keep original casing from first occurrence
          monthlyAvg: Math.round(avgAmt * 100) / 100,
          occurrences: monthSet.size,
          category: txns[0].category,
          total: txns.reduce((s, t) => s + t.amount, 0),
        });
      }
      recurring.sort((a, b) => b.monthlyAvg - a.monthlyAvg);
      const recurringTotal = recurring.reduce((s, r) => s + r.monthlyAvg, 0);

      // ── TOP MERCHANTS (enriched) ──
      const merchantDetails = {};
      transactions.forEach(t => {
        const key = t.description.toUpperCase().replace(/[^A-Z\s]/g, '').replace(/\s+/g, ' ').trim();
        if (!merchantDetails[key]) merchantDetails[key] = { name: t.description, txns: [], total: 0 };
        merchantDetails[key].txns.push(t);
        merchantDetails[key].total += t.amount;
      });
      const topMerchants = Object.values(merchantDetails)
        .sort((a, b) => b.total - a.total)
        .slice(0, 15)
        .map(m => ({
          name: m.name,
          total: m.total,
          monthlyAvg: m.total / months,
          count: m.txns.length,
          category: m.txns[0].category,
        }));


      // ── 50/30/20 BUDGET RULE ──
      const needsCats = ['Rent', 'Bills & Loans', 'Groceries', 'Transport', 'Health'];
      const wantsCats = ['Food', 'Shopping', 'Entertainment', 'Subscriptions', 'Travel'];
      const savingsCats = ['Savings', 'CC Payment'];
      const needsTotal = transactions.filter(t => needsCats.includes(t.category)).reduce((s, t) => s + t.amount, 0);
      const wantsTotal = transactions.filter(t => wantsCats.includes(t.category)).reduce((s, t) => s + t.amount, 0);
      const savingsForRule = savingsAmt + ccPayAmt;
      const ruleBase = needsTotal + wantsTotal + savingsForRule;
      const budgetRule = ruleBase > 0 ? {
        needs: Math.round(needsTotal / ruleBase * 100),
        wants: Math.round(wantsTotal / ruleBase * 100),
        savings: Math.round(savingsForRule / ruleBase * 100),
        needsAmt: needsTotal, wantsAmt: wantsTotal, savingsAmt: savingsForRule,
      } : null;

      // ── DAY-OF-WEEK PATTERNS ──
      const dowTotals = [0, 0, 0, 0, 0, 0, 0];
      const dowCounts = [0, 0, 0, 0, 0, 0, 0];
      const dowNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      transactions.forEach(t => {
        const d = t.date.getDay();
        dowTotals[d] += t.amount;
        dowCounts[d]++;
      });
      const dowAvg = dowTotals.map((tot, i) => dowCounts[i] > 0 ? tot / dowCounts[i] : 0);
      const maxDowAvg = Math.max(...dowAvg);
      const dayOfWeek = dowNames.map((name, i) => ({
        name, total: dowTotals[i], avg: dowAvg[i], count: dowCounts[i],
        pct: maxDowAvg > 0 ? Math.round(dowAvg[i] / maxDowAvg * 100) : 0,
      }));
      const peakDay = dayOfWeek.reduce((a, b) => a.avg > b.avg ? a : b);
      const calmDay = dayOfWeek.reduce((a, b) => (a.avg < b.avg && a.count > 0) ? a : b);

      // ── DAILY SPENDING MAP (for heatmap) ──
      const dailyMap = {};
      transactions.forEach(t => {
        const key = t.date.toISOString().slice(0, 10);
        dailyMap[key] = (dailyMap[key] || 0) + t.amount;
      });
      const dailyEntries = Object.entries(dailyMap).sort((a, b) => a[0].localeCompare(b[0]));
      const maxDaily = Math.max(...dailyEntries.map(e => e[1]), 1);
      const biggestDay = dailyEntries.length > 0
        ? dailyEntries.reduce((a, b) => a[1] > b[1] ? a : b)
        : null;

      // ── MONEY PERSONALITY ──
      let personality = { label: 'The Balanced Spender', emoji: '\u2696\uFE0F', desc: 'You keep a healthy balance across categories.' };
      const lsBase = lifestyleTotal || 1; // avoid division by zero
      const foodPct = (byCategory['Food'] || 0) / lsBase * 100;
      const grocPct = (byCategory['Groceries'] || 0) / lsBase * 100;
      const shopPct = (byCategory['Shopping'] || 0) / lsBase * 100;
      const entPct = (byCategory['Entertainment'] || 0) / lsBase * 100;
      const travelPct = (byCategory['Travel'] || 0) / lsBase * 100;
      const subPct = (byCategory['Subscriptions'] || 0) / lsBase * 100;
      if (savingsRate > 30) personality = { label: 'The Saver', emoji: '\u{1F3E6}', desc: 'You prioritize saving over spending \u2014 great financial discipline.' };
      else if (foodPct + grocPct > 35) personality = { label: 'The Foodie', emoji: '\u{1F37D}\uFE0F', desc: 'Food is where your money goes \u2014 restaurants, groceries, and everything delicious.' };
      else if (shopPct > 25) personality = { label: 'The Shopaholic', emoji: '\u{1F6CD}\uFE0F', desc: 'Retail therapy is your thing. You know what you like.' };
      else if (travelPct > 20) personality = { label: 'The Explorer', emoji: '\u2708\uFE0F', desc: 'You invest in experiences \u2014 travel takes a big slice of your spending.' };
      else if (subPct > 15) personality = { label: 'The Subscriber', emoji: '\u{1F4F1}', desc: 'You\u2019re plugged in \u2014 digital subscriptions are a major recurring cost.' };
      else if (entPct > 20) personality = { label: 'The Social Butterfly', emoji: '\u{1F389}', desc: 'Entertainment and going out drive your spending. You value experiences.' };
      else if (weekendRatio > 2) personality = { label: 'The Weekend Warrior', emoji: '\u{1F389}', desc: 'You keep it tight on weekdays but cut loose on weekends.' };

      return { hero, insights, focus, action, period, stats: {
        total, lifestyleTotal, monthlyTotal, dailyAvg, months,
        byCategory, sortedCats, sortedMerchants, transactions,
        weeklySpends, monthlySpends,
        savingsAmt, ccPayAmt, hasCCStatement,
        totalIncome, byIncomeSource, sortedIncome, netFlow, savingsRate,
        inflows, recurring, recurringTotal, topMerchants,
        budgetRule, dayOfWeek, peakDay, calmDay,
        dailyEntries, maxDaily, biggestDay, personality,
      }};
    }

    function formatNum(n) { return n.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 }); }
    function formatCurrency(n) { return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

    // ─── FLOATING LINES ───
    function FloatingLines() {
      const canvasRef = useRef(null);
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let animId;

        const setSize = () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        };
        setSize();
        window.addEventListener('resize', setSize);

        const makeLines = () => Array.from({ length: Math.max(10, Math.floor(canvas.height / 12)) }, () => ({
          y:  Math.random() * canvas.height,
          f:  0.0015 + Math.random() * 0.0014,
          a1: 2.5 + Math.random() * 4.5,
          a2: 1.0 + Math.random() * 2.5,
          p1: Math.random() * Math.PI * 2,
          p2: Math.random() * Math.PI * 2,
          s1: (0.003 + Math.random() * 0.004) * (Math.random() > 0.5 ? 1 : -1),
          s2: (0.002 + Math.random() * 0.003) * (Math.random() > 0.5 ? 1 : -1),
          op: 0.013 + Math.random() * 0.019,
        }));

        const lines = makeLines();

        const draw = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          lines.forEach(l => {
            l.p1 += l.s1;
            l.p2 += l.s2;
            ctx.beginPath();
            for (let x = 0; x <= canvas.width; x += 3) {
              const y = l.y + Math.sin(x * l.f + l.p1) * l.a1 + Math.sin(x * l.f * 1.7 + l.p2) * l.a2;
              x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.strokeStyle = `rgba(90, 195, 175, ${l.op})`;
            ctx.lineWidth = 0.75;
            ctx.stroke();
          });
          animId = requestAnimationFrame(draw);
        };
        draw();

        return () => { cancelAnimationFrame(animId); window.removeEventListener('resize', setSize); };
      }, []);

      return <canvas ref={canvasRef} style={{ position: 'fixed', inset: 0, pointerEvents: 'none', zIndex: 0 }} />;
    }

    // ── Recursively read all PDF/CSV files from a FileSystemEntry (file or directory)
    async function readAllFromEntry(entry) {
      if (!entry) return [];
      if (entry.isFile) {
        return new Promise(res => entry.file(f => {
          const n = f.name.toLowerCase();
          res((n.endsWith('.pdf') || n.endsWith('.csv')) ? [f] : []);
        }, () => res([])));
      }
      if (entry.isDirectory) {
        const reader = entry.createReader();
        const allFiles = [];
        let batch;
        do {
          batch = await new Promise((res, rej) => reader.readEntries(res, rej));
          const nested = await Promise.all(batch.map(readAllFromEntry));
          nested.forEach(arr => allFiles.push(...arr));
        } while (batch.length > 0);
        return allFiles;
      }
      return [];
    }

    function PieChart({ data }) {
      const total = data.reduce((s, d) => s + d.value, 0);
      let cum = 0;
      const size = 180, cx = 90, r = 70;
      const ptc = (cx2, cy, rad, deg) => {
        const a = (deg - 90) * Math.PI / 180;
        return { x: cx2 + rad * Math.cos(a), y: cy + rad * Math.sin(a) };
      };

      return (
        <div className="pie-chart-container">
          <svg width={size} height={size} viewBox={'0 0 ' + size + ' ' + size}>
            {data.map((d, i) => {
              const s1 = (cum / total) * 360;
              cum += d.value;
              const s2 = (cum / total) * 360;
              const p1 = ptc(cx, cx, r, s2);
              const p2 = ptc(cx, cx, r, s1);
              const big = s2 - s1 > 180 ? '1' : '0';
              return <path key={i} d={'M ' + cx + ' ' + cx + ' L ' + p1.x + ' ' + p1.y + ' A ' + r + ' ' + r + ' 0 ' + big + ' 0 ' + p2.x + ' ' + p2.y + ' Z'} fill={d.color} />;
            })}
          </svg>
          <div className="pie-legend">
            {data.map((d, i) => (
              <div key={i} className="pie-legend-item">
                <span className="pie-legend-dot" style={{ background: d.color }}></span>
                <span>{d.name}</span>
                <span className="pie-legend-amount">{formatCurrency(d.value)}</span>
                <span className="pie-legend-pct">{Math.round(d.value / total * 100)}%</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─── EXCEL EXPORT ───
    function exportToExcel(data) {
      const { period, stats } = data;
      const { transactions, sortedCats, total, monthlyTotal, dailyAvg, months } = stats;
      const wb = XLSX.utils.book_new();

      // ── Sheet 1: Transactions ──
      const txnHeader = ['Date', 'Description', 'Amount ($)', 'Category', 'Source'];
      const txnRows = [...transactions]
        .sort((a, b) => a.date - b.date)
        .map(t => [
          t.date.toLocaleDateString('en-CA'), // YYYY-MM-DD
          t.description,
          t.amount,
          t.category,
          t.source === 'bank' ? 'Bank' : 'Credit Card',
        ]);

      const txnData = [txnHeader, ...txnRows];
      const txnWs = XLSX.utils.aoa_to_sheet(txnData);

      // Style: freeze header row, set column widths
      txnWs['!freeze'] = { xSplit: 0, ySplit: 1 };
      txnWs['!cols'] = [{ wch: 12 }, { wch: 45 }, { wch: 14 }, { wch: 16 }, { wch: 14 }];

      // Format Amount column as currency
      const numFmt = '$#,##0.00';
      for (let r = 2; r <= txnRows.length + 1; r++) {
        const cell = txnWs['C' + r];
        if (cell) cell.z = numFmt;
      }

      // Add total row with SUM formula
      const totalRow = txnRows.length + 2;
      txnWs['A' + totalRow] = { v: 'TOTAL', t: 's' };
      txnWs['C' + totalRow] = { f: 'SUM(C2:C' + (totalRow - 1) + ')', t: 'n', z: numFmt };
      const lastCell = XLSX.utils.encode_cell({ r: totalRow - 1, c: 4 });
      txnWs['!ref'] = 'A1:' + lastCell;

      XLSX.utils.book_append_sheet(wb, txnWs, 'Transactions');

      // ── Sheet 2: Summary ──
      const cats = sortedCats.map(([name]) => name);
      const nTxn = txnRows.length;

      // Build summary rows
      const sumRows = [
        ['Financial Reality Check — Spending Summary'],
        [],
        ['Statement Period', period.range],
        ['Duration', period.label],
        ['Total Transactions', { f: 'COUNTA(Transactions!B2:B' + (nTxn + 1) + ')', t: 'n' }],
        [],
        ['SPENDING SUMMARY'],
        ['Total Spend', { f: 'SUM(Transactions!C2:C' + (nTxn + 1) + ')', t: 'n', z: '$#,##0.00' }],
        ['Months Covered', months],
        ['Monthly Average', { f: 'B8/B9', t: 'n', z: '$#,##0.00' }],
        ['Daily Average (' + period.diffDays + ' days)', { f: 'B8/' + period.diffDays, t: 'n', z: '$#,##0.00' }],
        [],
        ['SPENDING BY CATEGORY'],
        ['Category', 'Total ($)', '% of Spend'],
      ];

      // Category rows with SUMIF formulas
      cats.forEach(cat => {
        const pct = { f: 'B' + (sumRows.length + 1) + '/B$8', t: 'n', z: '0.0%' };
        sumRows.push([
          cat,
          { f: 'SUMIF(Transactions!D:D,"' + cat + '",Transactions!C:C)', t: 'n', z: '$#,##0.00' },
          pct,
        ]);
      });

      // Other / uncategorised
      sumRows.push([
        'Other',
        { f: 'SUMIF(Transactions!D:D,"Other",Transactions!C:C)', t: 'n', z: '$#,##0.00' },
        { f: 'B' + (sumRows.length + 1) + '/B$8', t: 'n', z: '0.0%' },
      ]);

      // Category total check
      const catStart = 15; // row where first category starts (1-indexed)
      const catEnd = catStart + cats.length; // includes Other
      sumRows.push([]);
      sumRows.push(['Category Total Check', { f: 'SUM(B' + catStart + ':B' + catEnd + ')', t: 'n', z: '$#,##0.00' }]);

      // Convert to worksheet — need to handle cell objects inside the aoa
      const sumWs = XLSX.utils.aoa_to_sheet(
        sumRows.map(row => row.map(cell =>
          (cell && typeof cell === 'object' && ('f' in cell || 'v' in cell)) ? '' : (cell === undefined ? '' : cell)
        ))
      );

      // Inject formula cells manually (aoa_to_sheet doesn't support formula objects)
      sumRows.forEach((row, ri) => {
        row.forEach((cell, ci) => {
          if (cell && typeof cell === 'object' && 'f' in cell) {
            const addr = XLSX.utils.encode_cell({ r: ri, c: ci });
            sumWs[addr] = { ...cell };
          }
        });
      });

      sumWs['!cols'] = [{ wch: 28 }, { wch: 16 }, { wch: 14 }];

      // Update ref to cover all rows
      sumWs['!ref'] = 'A1:C' + sumRows.length;

      XLSX.utils.book_append_sheet(wb, sumWs, 'Summary');

      // Download
      const filename = 'financial-reality-check-' + new Date().toISOString().slice(0, 10) + '.xlsx';
      XLSX.writeFile(wb, filename);
    }

      const [showDow, setShowDow] = useState(false);
      const [showHeatmap, setShowHeatmap] = useState(false);
      const [txnSearch, setTxnSearch] = useState('');
      const [txnCatFilter, setTxnCatFilter] = useState(null);

      const allTxnsSorted = [...stats.transactions].sort((a, b) => b.amount - a.amount);
      // Apply search + category filter
      const filteredTxns = allTxnsSorted.filter(t => {
        if (txnCatFilter && t.category !== txnCatFilter) return false;
        if (txnSearch && !t.description.toLowerCase().includes(txnSearch.toLowerCase())) return false;
        return true;
      });
      const topTxns = showAllTxns ? filteredTxns : filteredTxns.slice(0, 20);

      // Build cash flow grid items with scroll targets
      const cfItems = [];
      if (hasIncome) {
        cfItems.push({
          cls: 'cf-income', label: 'Total Income', amt: stats.totalIncome, sign: '',
          hint: 'See breakdown \u2193',
          onClick: () => scrollTo(incomeRef, () => setShowIncome(true)),
        });
        cfItems.push({
          cls: 'cf-spend', label: 'Lifestyle Spend', amt: stats.lifestyleTotal, sign: '',
          hint: 'By category \u2193',
          onClick: () => scrollTo(catRef, () => setShowCat(true)),
        });
        if (stats.savingsAmt > 0) {
          const srLabel = stats.savingsRate ? 'Saved (' + stats.savingsRate + '%)' : 'Saved';
          cfItems.push({
            cls: 'cf-savings', label: srLabel, amt: stats.savingsAmt, sign: '',
            hint: 'In insights \u2193',
            onClick: () => scrollTo(insightsRef, null),
          });
        }
        if (stats.ccPayAmt > 0 && !stats.hasCCStatement) {
          cfItems.push({
            cls: 'cf-cc', label: 'CC Payments', amt: stats.ccPayAmt, sign: '',
            hint: 'Add CC statement \u2193',
            onClick: () => { setShowAddMore(true); setTimeout(() => document.getElementById('add-more-anchor')?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 80); },
          });
        }
        if (stats.netFlow !== null) {
          const isPos = stats.netFlow >= 0;
          cfItems.push({
            cls: isPos ? 'cf-net-pos' : 'cf-net-neg',
            label: 'Net Flow', amt: Math.abs(stats.netFlow), sign: isPos ? '+' : '\u2212',
            hint: isPos ? 'Nice work \u{1F44D}' : 'See insights \u2193',
            onClick: isPos ? null : () => scrollTo(insightsRef, null),
          });
        }
      }

      // Dedup helper for merging
      const dedupTxns = (arr) => {
        const seen = new Set();
        return arr.filter(t => {
          const k = t.date.getTime() + '|' + t.description + '|' + t.amount + '|' + t.source;
          if (seen.has(k)) return false;
          seen.add(k); return true;
        });
      };

      const handleAddFileList = (list, isCredit) => {
        const files = Array.from(list);
        if (isCredit) setAddCreditFiles(prev => {
          const existing = new Set(prev.map(f => f.name + f.size));
          return [...prev, ...files.filter(f => !existing.has(f.name + f.size))];
        });
        else setAddBankFiles(prev => {
          const existing = new Set(prev.map(f => f.name + f.size));
          return [...prev, ...files.filter(f => !existing.has(f.name + f.size))];
        });
      };

      const handleMerge = async () => {
        if (addBankFiles.length === 0 && addCreditFiles.length === 0) return;
        setMerging(true);
        let newTxns = [], newInflows = [];
        for (const f of addCreditFiles) { const r = await readFile(f, 'credit'); newTxns.push(...r.transactions); newInflows.push(...(r.inflows||[])); }
        for (const f of addBankFiles) { const r = await readFile(f, 'bank'); newTxns.push(...r.transactions); newInflows.push(...(r.inflows||[])); }
        const allTxns = dedupTxns([...stats.transactions, ...newTxns]);
        const allInflows = dedupTxns([...(stats.inflows||[]), ...newInflows]);
        setActiveData(generateInsights(allTxns, allInflows));
        setAddBankFiles([]); setAddCreditFiles([]);
        setShowAddMore(false); setMerging(false);
        // reset expanded panels so user re-explores fresh data
        setShowIncome(false); setShowCat(false); setShowTime(false); setShowTxn(false);
      };

      const FilePill = ({ file, onRemove }) => (
        <span className="add-more-file-pill">
          {file.name.length > 20 ? file.name.slice(0, 18) + '\u2026' : file.name}
          <button onClick={onRemove}>\u00D7</button>
        </span>
      );

      return (
        <div className="results-screen">
          <div className="container">
            <div className="summary-card fade-in">
              <div className="summary-card-inner">
                <div className="summary-header">
                  <span className="summary-brand">
                    <span className="brand-dot"></span>
                    Financial Reality Check
                  </span>
                  <span className="period-badge">
                    <span className="period-dot"></span>
                    {period.range} &middot; {period.label}
                  </span>
                </div>
                <div className="summary-hero">{hero}</div>
                <div className="summary-stats">
                  <div className="summary-stat">
                    <div className="summary-stat-label">Total Out</div>
                    <div className="summary-stat-value">{formatCurrency(stats.total)}</div>
                  </div>
                  {hasIncome && (
                    <div className="summary-stat">
                      <div className="summary-stat-label">Total In</div>
                      <div className="summary-stat-value">{formatCurrency(stats.totalIncome)}</div>
                    </div>
                  )}
                  <div className="summary-stat">
                    <div className="summary-stat-label">{isMulti ? 'Monthly Avg' : 'Daily Avg'}</div>
                    <div className="summary-stat-value">{formatCurrency(isMulti ? stats.monthlyTotal : stats.dailyAvg)}</div>
                  </div>
                  <div className="summary-stat">
                    <div className="summary-stat-label">Top Category</div>
                    <div className="summary-stat-value" style={{ fontSize: 15 }}>{stats.sortedCats[0] ? stats.sortedCats[0][0] : 'N/A'}</div>
                  </div>
                </div>
              </div>
            </div>

            {(() => {
              const diags = activeData.fileDiagnostics || [];
              const emptyFiles = diags.filter(d => d.txnCount === 0 && d.inflowCount === 0);
              const totalTxn = diags.reduce((s, d) => s + d.txnCount, 0);
              const totalOther = diags.reduce((s, d) => s + d.otherCount, 0);
              const otherRatio = totalTxn > 0 ? totalOther / totalTxn : 0;
              const showWarn = emptyFiles.length > 0 || otherRatio > 0.4;
              if (!showWarn) return null;
              return (
                <div className="parse-warning fade-in fade-in-d1">
                  {emptyFiles.length > 0 && (
                    <div>
                      <strong>Heads up:</strong> we couldn{'\u2019'}t read {emptyFiles.length === 1 ? 'one file' : emptyFiles.length + ' files'}
                      {' '}({emptyFiles.map(d => d.fileName).join(', ')}). This bank{'\u2019'}s layout may be new \u2014 try another statement or share the file so we can add support.
                    </div>
                  )}
                  {otherRatio > 0.4 && (
                    <div style={{ marginTop: emptyFiles.length > 0 ? 6 : 0 }}>
                      <strong>{Math.round(otherRatio * 100)}%</strong> of transactions landed in <em>Other</em>. Click any category tag below to re-classify \u2014 or expand &ldquo;Top transactions&rdquo; to review.
                    </div>
                  )}
                </div>
              );
            })()}

            {cfItems.length > 0 && (
              <div className="cashflow-grid fade-in fade-in-d1">
                {cfItems.map((item, i) => (
                  <div
                    key={i}
                    className={'cashflow-item ' + item.cls}
                    data-clickable={item.onClick ? '' : undefined}
                    onClick={item.onClick || undefined}
                    title={item.onClick ? 'Click to jump to details' : undefined}
                  >
                    <div className="cf-label">{item.label}</div>
                    <div className="cf-amount">{item.sign}{formatCurrency(item.amt)}</div>
                    {item.onClick && <div className="cf-caret">{item.hint}</div>}
                  </div>
                ))}
              </div>
            )}

            <div className="section fade-in fade-in-d2 scroll-target" ref={insightsRef}>
              <div className="section-label">What{'\u2019'}s actually happening</div>
              <div className="insight-list">
                {insights.map((ins, i) => <div key={i} className="insight-card">{ins}</div>)}
              </div>
            </div>

            <div className="section fade-in fade-in-d3">
              <div className="section-label">One thing to pay attention to</div>
              <div className="focus-card">
                <div className="focus-icon">{'\u26A1'}</div>
                <div className="focus-text">{focus}</div>
              </div>
            </div>

            <div className="section fade-in fade-in-d4">
              <div className="section-label">One simple action</div>
              <div className="action-card">
                <div className="action-icon">{'\u{1F4A1}'}</div>
                <div className="action-text">{action}</div>
              </div>
            </div>

            <div className="section fade-in fade-in-d5">
              <div className="section-label">Details</div>

              {hasIncome && (
                <div ref={incomeRef} className="scroll-target">
                  <button className="details-toggle" onClick={() => setShowIncome(!showIncome)}>
                    <span>{'Income breakdown \u2014 ' + formatCurrency(stats.totalIncome) + ' total'}</span>
                    <span>{showIncome ? '\u25B2' : '\u25BC'}</span>
                  </button>
                  {showIncome && (
                    <div className="details-content">
                      <table className="txn-table">
                        <thead><tr><th>Source</th><th style={{ textAlign: 'right' }}>Amount</th><th style={{ textAlign: 'right' }}>% of Income</th></tr></thead>
                        <tbody>
                          {stats.sortedIncome.map(([cat, amt], i) => (
                            <tr key={i}><td>{cat}</td><td className="amount">{formatCurrency(amt)}</td><td className="amount">{Math.round(amt / stats.totalIncome * 100)}%</td></tr>
                          ))}
                        </tbody>
                      </table>
                      {stats.inflows && stats.inflows.length > 0 && (
                        <div style={{ marginTop: 14 }}>
                          <div className="detail-sublabel">Individual deposits</div>
                          <table className="txn-table">
                            <thead><tr><th>Date</th><th>Description</th><th>Category</th><th style={{ textAlign: 'right' }}>Amount</th></tr></thead>
                            <tbody>
                              {[...stats.inflows].sort((a, b) => b.amount - a.amount).slice(0, 20).map((t, i) => (
                                <tr key={i}>
                                  <td>{t.date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</td>
                                  <td>{t.description}</td>
                                  <td><span className="category-tag" style={{ background: 'var(--accent-light)', color: 'var(--accent)' }}>{t.category}</span></td>
                                  <td className="amount">{formatCurrency(t.amount)}</td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              )}

              {/* \u2500\u2500 Category breakdown (clickable filter chips) \u2500\u2500 */}
              <div ref={catRef} className="scroll-target" style={{ marginTop: hasIncome ? 10 : 0 }}>
                <button className="details-toggle" onClick={() => setShowCat(!showCat)}>
                  <span>Spending by category{isMulti ? ' (total)' : ''}</span>
                  <span>{showCat ? '\u25B2' : '\u25BC'}</span>
                </button>
                {showCat && (
                  <div className="details-content">
                    <PieChart data={pieData} />
                    <div className="cat-chip-row">
                      {txnCatFilter && (
                        <button className="cat-chip active" onClick={() => setTxnCatFilter(null)} style={{ background: '#71717A', color: '#fff' }}>
                          {'\u2715'} Clear filter
                        </button>
                      )}
                      {pieData.map((d, i) => (
                        <button
                          key={i}
                          className={'cat-chip' + (txnCatFilter === d.name ? ' active' : '')}
                          style={{ borderColor: d.color, color: txnCatFilter === d.name ? '#fff' : d.color, background: txnCatFilter === d.name ? d.color : d.color + '15' }}
                          onClick={() => { setTxnCatFilter(txnCatFilter === d.name ? null : d.name); setShowTxn(true); setShowAllTxns(false); }}
                        >
                          {d.name} {'\u00B7'} {formatCurrency(d.value)}
                        </button>
                      ))}
                    </div>
                  </div>
                )}
              </div>

              {/* \u2500\u2500 Recurring charges \u2500\u2500 */}
              {stats.recurring && stats.recurring.length > 0 && (
                <div style={{ marginTop: 10 }}>
                  <button className="details-toggle" onClick={() => setShowRecurring(!showRecurring)}>
                    <span>{'Recurring charges \u2014 ~' + formatCurrency(stats.recurringTotal) + '/month (' + stats.recurring.length + ' detected)'}</span>
                    <span>{showRecurring ? '\u25B2' : '\u25BC'}</span>
                  </button>
                  {showRecurring && (
                    <div className="details-content">
                      <div className="recurring-list">
                        {stats.recurring.map((r, i) => {
                          const color = CAT_COLORS[r.category] || '#71717A';
                          return (
                            <div key={i} className="recurring-item">
                              <div className="recurring-main">
                                <span className="recurring-name">{r.merchant}</span>
                                <span className="category-tag" style={{ background: color + '20', color, fontSize: 10 }}>{r.category}</span>
                              </div>
                              <div className="recurring-meta">
                                <span className="recurring-amt">~{formatCurrency(r.monthlyAvg)}/mo</span>
                                <span className="recurring-freq">{r.occurrences} months</span>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* \u2500\u2500 Top merchants \u2500\u2500 */}
              {stats.topMerchants && stats.topMerchants.length > 0 && (
                <div style={{ marginTop: 10 }}>
                  <button className="details-toggle" onClick={() => setShowMerchants(!showMerchants)}>
                    <span>Top merchants</span>
                    <span>{showMerchants ? '\u25B2' : '\u25BC'}</span>
                  </button>
                  {showMerchants && (
                    <div className="details-content">
                      <div className="merchant-list">
                        {stats.topMerchants.map((m, i) => {
                          const color = CAT_COLORS[m.category] || '#71717A';
                          const pct = stats.total > 0 ? Math.round(m.total / stats.total * 100) : 0;
                          return (
                            <div key={i} className="merchant-item">
                              <div className="merchant-bar" style={{ width: Math.max(4, pct) + '%', background: color + '30' }}></div>
                              <div className="merchant-row">
                                <span className="merchant-name">{m.name}</span>
                                <span className="merchant-stats">
                                  {formatCurrency(m.total)} total {'\u00B7'} {m.count} txn{m.count > 1 ? 's' : ''} {'\u00B7'} ~{formatCurrency(m.monthlyAvg)}/mo
                                </span>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* \u2500\u2500 Spending over time \u2500\u2500 */}
              <button className="details-toggle" style={{ marginTop: 10 }} onClick={() => setShowTime(!showTime)}>
                <span>{isMulti ? 'Monthly spending' : 'Weekly spending'}</span>
                <span>{showTime ? '\u25B2' : '\u25BC'}</span>
              </button>
              {showTime && (
                <div className="details-content">
                  <div className="bar-chart">
                    {timeline.map((e, i) => (
                      <div key={i} className="bar-row">
                        <span className="bar-label">{e.label}</span>
                        <div className="bar-track">
                          <div className="bar-fill" style={{ width: Math.max(5, e.amount / maxT * 100) + '%' }}>
                            {formatCurrency(e.amount)}
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* \u2500\u2500 Money Personality \u2500\u2500 */}
              {stats.personality && (
                <div className="personality-card fade-in">
                  <div className="personality-emoji">{stats.personality.emoji}</div>
                  <div className="personality-label">{stats.personality.label}</div>
                  <div className="personality-desc">{stats.personality.desc}</div>
                </div>
              )}

              {/* \u2500\u2500 50/30/20 Budget Rule \u2500\u2500 */}
              {stats.budgetRule && (
                <div className="budget-rule-section">
                  <button className="details-toggle" style={{ marginTop: 10 }} onClick={() => setShowBudgetRule(!showBudgetRule)}>
                    <span>{'50/30/20 Budget check'}</span>
                    <span>{showBudgetRule ? '\u25B2' : '\u25BC'}</span>
                  </button>
                  {showBudgetRule && (
                    <div className="details-content">
                      <div style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: 8 }}>
                        The 50/30/20 rule suggests 50% on needs, 30% on wants, 20% on savings.
                      </div>
                      <div className="budget-bars">
                        {[
                          { label: 'Needs', pct: stats.budgetRule.needs, target: 50, amt: stats.budgetRule.needsAmt, color: '#2A5E3A' },
                          { label: 'Wants', pct: stats.budgetRule.wants, target: 30, amt: stats.budgetRule.wantsAmt, color: '#8A6020' },
                          { label: 'Savings', pct: stats.budgetRule.savings, target: 20, amt: stats.budgetRule.savingsAmt, color: '#2A4A7A' },
                        ].map(b => (
                          <div key={b.label} className="budget-bar-row">
                            <div className="budget-bar-label">{b.label}</div>
                            <div className="budget-bar-track">
                              <div className="budget-bar-fill" style={{ width: Math.min(100, b.pct) + '%', background: b.color }}>
                                {b.pct}%
                              </div>
                              <div className="budget-bar-target" style={{ left: b.target + '%' }} data-label={b.target + '% target'}></div>
                            </div>
                            <div className="budget-bar-info">{formatCurrency(b.amt)}</div>
                          </div>
                        ))}
                      </div>
                      <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 12, textAlign: 'center' }}>
                        {stats.budgetRule.needs <= 55 && stats.budgetRule.savings >= 15
                          ? '\u2705 You\u2019re close to the ideal 50/30/20 split \u2014 well done!'
                          : stats.budgetRule.needs > 60
                            ? '\u26A0\uFE0F Needs are taking over ' + stats.budgetRule.needs + '% \u2014 look for ways to reduce fixed costs'
                            : stats.budgetRule.savings < 10
                              ? '\u26A0\uFE0F Savings are only ' + stats.budgetRule.savings + '% \u2014 try automating a transfer each payday'
                              : '\u{1F4CA} Room to optimize \u2014 small shifts in wants spending can boost your savings rate'
                        }
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* \u2500\u2500 Day of Week Patterns \u2500\u2500 */}
              {stats.dayOfWeek && (
                <div>
                  <button className="details-toggle" style={{ marginTop: 10 }} onClick={() => setShowDow(!showDow)}>
                    <span>{'Day-of-week patterns'}</span>
                    <span>{showDow ? '\u25B2' : '\u25BC'}</span>
                  </button>
                  {showDow && (
                    <div className="details-content">
                      <div className="dow-grid">
                        {stats.dayOfWeek.map((d, i) => (
                          <div key={i} className="dow-col">
                            <div className="dow-amount">{'$' + Math.round(d.avg)}</div>
                            <div
                              className="dow-bar"
                              style={{
                                height: Math.max(4, d.pct) + '%',
                                background: d.name === stats.peakDay.name ? 'var(--accent)' : 'var(--border)',
                              }}
                            ></div>
                            <div className="dow-label">{d.name}</div>
                          </div>
                        ))}
                      </div>
                      <div style={{ fontSize: 12, color: 'var(--text-muted)', textAlign: 'center', marginTop: 10 }}>
                        {'Peak: ' + stats.peakDay.name + ' (~' + formatCurrency(stats.peakDay.avg) + '/day avg) \u00B7 Quietest: ' + stats.calmDay.name + ' (~' + formatCurrency(stats.calmDay.avg) + '/day avg)'}
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* \u2500\u2500 Spending Heatmap \u2500\u2500 */}
              {stats.dailyEntries && stats.dailyEntries.length > 7 && (
                <div>
                  <button className="details-toggle" style={{ marginTop: 10 }} onClick={() => setShowHeatmap(!showHeatmap)}>
                    <span>Spending calendar</span>
                    <span>{showHeatmap ? '\u25B2' : '\u25BC'}</span>
                  </button>
                  {showHeatmap && (
                    <div className="details-content">
                      <div className="heatmap-wrap">
                        <div className="heatmap-grid">
                          {stats.dailyEntries.map(([date, amt], i) => {
                            const intensity = amt / stats.maxDaily;
                            const alpha = 0.1 + intensity * 0.85;
                            return (
                              <div
                                key={i}
                                className="heatmap-cell"
                                style={{ background: 'rgba(42, 94, 58, ' + alpha + ')' }}
                                data-tip={new Date(date + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ': $' + Math.round(amt)}
                              ></div>
                            );
                          })}
                        </div>
                        <div className="heatmap-legend">
                          <span>Less</span>
                          {[0.1, 0.3, 0.55, 0.8, 1].map((a, i) => (
                            <div key={i} className="heatmap-legend-cell" style={{ background: 'rgba(42, 94, 58, ' + (0.1 + a * 0.85) + ')' }}></div>
                          ))}
                          <span>More</span>
                        </div>
                      </div>
                      {stats.biggestDay && (
                        <div className="biggest-day-callout">
                          {'\u{1F4B8} Biggest spending day: '}
                          <strong>{new Date(stats.biggestDay[0] + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}</strong>
                          {' \u2014 ' + formatCurrency(stats.biggestDay[1]) + ' across the day'}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              )}

              {/* \u2500\u2500 Transactions (with search + filter) \u2500\u2500 */}
              <button className="details-toggle" style={{ marginTop: 10 }} onClick={() => setShowTxn(!showTxn)}>
                <span>{'Transactions (' + stats.transactions.length + ')'}{txnCatFilter ? ' \u2014 ' + txnCatFilter : ''}</span>
                <span>{showTxn ? '\u25B2' : '\u25BC'}</span>
              </button>
              {showTxn && (
                <div className="details-content">
                  <div className="txn-search-row">
                    <input
                      type="text"
                      className="txn-search"
                      placeholder="Search transactions\u2026"
                      value={txnSearch}
                      onChange={e => setTxnSearch(e.target.value)}
                    />
                    {(txnSearch || txnCatFilter) && (
                      <span className="txn-filter-info">
                        {filteredTxns.length} of {allTxnsSorted.length} shown
                        {txnCatFilter && <button className="txn-clear-btn" onClick={() => setTxnCatFilter(null)}>{'\u2715'} {txnCatFilter}</button>}
                        {txnSearch && <button className="txn-clear-btn" onClick={() => setTxnSearch('')}>{'\u2715'} search</button>}
                      </span>
                    )}
                  </div>
                  <table className="txn-table">
                    <thead>
                      <tr><th>Date</th><th>Description</th><th>Category</th><th style={{ textAlign: 'right' }}>Amount</th></tr>
                    </thead>
                    <tbody>
                      {topTxns.map((t, i) => {
                        const tk = txnKey(t);
                        const isOpen = openOverrideKey === tk;
                        const color = CAT_COLORS[t.category] || '#71717A';

                          <tr key={i}>
                            <td>{t.date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</td>

                              <span
                                className="category-tag cat-tag-editable"
                                style={{ background: color + '20', color, cursor: 'pointer' }}
                                onClick={() => setOpenOverrideKey(isOpen ? null : tk)}
                                title="Click to change category"
                              >
                                {t.category}<span style={{ fontSize: '0.65em', marginLeft: 3, opacity: 0.7 }}>\u25BE</span>
                              </span>
                              {isOpen && (
                                <div className="cat-override-dropdown">
                                  {ALL_CATEGORIES.map(cat => (
                                    <div
                                      key={cat}
                                      className={'cat-override-option' + (cat === t.category ? ' selected' : '')}
                                      style={{ color: CAT_COLORS[cat] || '#71717A' }}
                                      onClick={() => applyOverride(t, cat)}
                                    >
                                      {cat}
                                    </div>
                                  ))}
                                </div>
                              )}
                            </td>
                            <td className="amount">{formatCurrency(t.amount)}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                  {filteredTxns.length > 20 && (
                    <button className="show-all-txn-btn" onClick={() => setShowAllTxns(v => !v)}>
                      {showAllTxns ? 'Show top 20 only' : 'Show all ' + filteredTxns.length + ' transactions'}
                    </button>
                  )}
                  {filteredTxns.length === 0 && (
                    <div style={{ textAlign: 'center', padding: 20, color: 'var(--text-muted)', fontSize: 13 }}>
                      No transactions match your filters
                    </div>
                  )}
                </div>
              )}
            </div>


            {/* ── Add More Statements ── */}
            <div id="add-more-anchor" className="fade-in fade-in-d6" style={{ marginBottom: 24 }}>
              {!showAddMore ? (
                <div style={{ textAlign: 'center' }}>
                  <button className="add-statement-btn" onClick={() => setShowAddMore(true)}>
                    {'\u2795'} Add more statements
                  </button>
                </div>
              ) : (
                <div className="add-more-panel">
                  <div className="add-more-title">Add more statements — they{'\u2019'}ll be merged with your current analysis</div>
                  <div className="add-more-cols">
                    <div>
                      <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 6 }}>Bank Statements</div>
                      <div className="add-more-zone">
                        <input type="file" accept=".pdf,.csv" multiple onChange={e => handleAddFileList(e.target.files, false)} />
                        <div className="add-more-zone-label">{'\u{1F3E6}'} Drop or click</div>
                        <div className="add-more-zone-hint">PDF or CSV</div>
                        {addBankFiles.length > 0 && (
                          <div className="add-more-zone-files">
                            {addBankFiles.map((f, i) => (
                              <FilePill key={i} file={f} onRemove={() => setAddBankFiles(p => p.filter((_, j) => j !== i))} />
                            ))}
                          </div>
                        )}
                      </div>
                    </div>
                    <div>
                      <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 6 }}>Credit Card Statements</div>
                      <div className="add-more-zone">
                        <input type="file" accept=".pdf,.csv" multiple onChange={e => handleAddFileList(e.target.files, true)} />
                        <div className="add-more-zone-label">{'\u{1F4B3}'} Drop or click</div>
                        <div className="add-more-zone-hint">PDF or CSV</div>
                        {addCreditFiles.length > 0 && (
                          <div className="add-more-zone-files">
                            {addCreditFiles.map((f, i) => (
                              <FilePill key={i} file={f} onRemove={() => setAddCreditFiles(p => p.filter((_, j) => j !== i))} />
                            ))}
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                  <div className="add-more-actions">
                    <button
                      className="add-more-btn"
                      disabled={merging || (addBankFiles.length === 0 && addCreditFiles.length === 0)}
                      onClick={handleMerge}
                    >
                      {merging ? 'Merging\u2026' : '\u{1F504} Re-analyze with all files'}
                    </button>
                    <button className="add-more-cancel" onClick={() => { setShowAddMore(false); setAddBankFiles([]); setAddCreditFiles([]); }}>
                      Cancel
                    </button>
                  </div>
                </div>
              )}
            </div>

            <div className="reset-section fade-in fade-in-d6">
              <button className="export-btn" onClick={() => exportToExcel(activeData)}>
                {'\u{1F4CA}'} Export to Excel
              </button>
              <button className="reset-btn" onClick={onReset}>Start over with new statements</button>
              <div style={{ marginTop: 16, fontSize: 13, color: 'var(--text-muted)', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6 }}>
                <LockIcon /> Your data was never uploaded or stored.
              </div>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [screen, setScreen] = useState('landing');
      const [files, setFiles] = useState({});
      const [useSample, setUseSample] = useState(false);
      const [results, setResults] = useState(null);

      const goHome = () => { setFiles({}); setUseSample(false); setResults(null); setScreen('landing'); };

      return (
        <div className="app-wrapper">
          <TopNav onHome={goHome} />
          {screen === 'landing' && <LandingPage onStart={() => setScreen('upload')} />}
          {screen === 'upload' && (
            <UploadScreen
              onAnalyze={(c, b, all) => { setFiles({ creditFiles: c, bankFiles: b, allFiles: all }); setUseSample(false); setScreen('processing'); }}
              onSample={() => { setUseSample(true); setScreen('processing'); }}
            />
          )}
          {screen === 'processing' && (
            <ProcessingScreen
              onDone={(d) => { setResults(d); setScreen('results'); }}
              files={files} useSample={useSample}
            />
          )}
          {screen === 'results' && <ResultsScreen data={results} onReset={goHome} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
